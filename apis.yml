aid: fireblocks
url: https://raw.githubusercontent.com/api-evangelist/fireblocks/refs/heads/main/apis.yml
apis:
  - aid: fireblocks:fireblocks-vaults-api
    name: Fireblocks Vaults API
    tags:
      - Digital Assets
      - Vaults
      - Custody
      - MPC
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-vaults-api-openapi.yml
        type: OpenAPI
      - url: json-schema/fireblocks-vault-account-schema.json
        type: JSONSchema
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Create and manage vault accounts, asset wallets, deposit addresses, attached tags, and balance inquiries. Vaults
      are the root container for MPC-secured keys, balances, and transactions inside a Fireblocks workspace. Supports
      paged listing, bulk address creation, customer-ref-id tagging, auto-fuel toggling, and UTXO/unspent-input
      enumeration.
  - aid: fireblocks:fireblocks-transactions-api
    name: Fireblocks Transactions API
    tags:
      - Digital Assets
      - Transactions
      - MPC
      - Custody
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-transactions-api-openapi.yml
        type: OpenAPI
      - url: json-schema/fireblocks-transaction-schema.json
        type: JSONSchema
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Create, cancel, drop, and query digital-asset transactions across all supported chains. Every transaction passes
      the workspace Policy Engine, is signed by the MPC quorum, and is broadcast under Fireblocks'
      fee-bump-and-rebroadcast logic. Supports transfers, raw signings, typed-message signings, contract calls,
      drop-and-replace, fee estimation, validate-address, and approval-request management.
  - aid: fireblocks:fireblocks-wallets-api
    name: Fireblocks Whitelisted Wallets API
    tags:
      - Digital Assets
      - Wallets
      - Whitelisting
      - Compliance
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-wallets-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Manage Fireblocks whitelisted destinations — internal wallets, external wallets, and whitelisted contracts.
      Internal wallets group addresses you own outside of vault accounts; external wallets identify counterparties
      (exchanges, payment processors, custodians). All approved destinations bypass one-time-address restrictions and
      accelerate the policy-engine quorum.
  - aid: fireblocks:fireblocks-assets-api
    name: Fireblocks Blockchains and Assets API
    tags:
      - Digital Assets
      - Blockchains
      - Assets
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-assets-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Enumerate the blockchains and assets supported by the workspace — native coins, ERC-20s, SPL tokens, BRC-20s, NFTs
      — and register new asset/contract pairs. Returns asset metadata including contract address, native asset,
      decimals, and on-chain id used by the rest of the Fireblocks API.
  - aid: fireblocks:fireblocks-exchange-api
    name: Fireblocks Exchange and Fiat Accounts API
    tags:
      - Digital Assets
      - Exchanges
      - Fiat
      - Trading
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-exchange-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Connect, read, and trade across exchange accounts and fiat (DDA) accounts. Manage exchange sub-accounts, perform
      internal exchange transfers, convert between assets, read manifests of trading pairs, fetch rates and balances,
      and surface Connected Accounts (Beta) and Trading (Beta) quotes/orders.
  - aid: fireblocks:fireblocks-tokenization-api
    name: Fireblocks Tokenization API
    tags:
      - Digital Assets
      - Tokenization
      - Stablecoins
      - Smart Contracts
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-tokenization-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Deploy, mint, burn, and manage tokens across the chains supported by Fireblocks Tokenization Engine. Covers ERC-20
      fungible tokens, multichain stablecoins, asset tokenization, smart contract management, and the full token
      lifecycle. Pricing is 3-30 basis points on Assets Under Custody.
  - aid: fireblocks:fireblocks-contracts-api
    name: Fireblocks Smart Contracts API
    tags:
      - Digital Assets
      - Smart Contracts
      - dApps
      - DeFi
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-contracts-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Deploy contract templates, manage deployed contracts, execute read/write contract interactions, and broker dApp
      connections via WalletConnect. Powers the Fireblocks DeFi security suite — every contract call passes the
      workspace Policy Engine and is simulated before MPC signing.
  - aid: fireblocks:fireblocks-staking-api
    name: Fireblocks Staking API
    tags:
      - Digital Assets
      - Staking
      - DeFi
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-staking-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Execute and track staking operations across multiple proof-of-stake chains. Browse staking providers and
      validators, initiate stake / unstake / withdraw / claim-rewards actions, and query position state. Backs
      institutional Earn workflows for ETH, SOL, ADA, DOT, KSM, NEAR, TEZOS, MATIC, and more.
  - aid: fireblocks:fireblocks-nfts-api
    name: Fireblocks NFTs API
    tags:
      - Digital Assets
      - NFTs
      - Tokens
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-nfts-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Discover, index, and manage non-fungible tokens held in the workspace's vault accounts. List owned NFTs, fetch
      token-level metadata, refresh ownership state, and update token-spam classification.
  - aid: fireblocks:fireblocks-payments-api
    name: Fireblocks Payments API
    tags:
      - Digital Assets
      - Payments
      - Stablecoins
      - Payouts
      - Smart Transfers
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-payments-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Run institutional crypto payment flows — payment configs, payout instruction sets, and Smart Transfer tickets
      (atomic multi-leg asset transfers between two counterparties). Powers cross-border B2B settlement, OTC desks, PSP
      rails, and the Fireblocks Agentic Payments Suite.
  - aid: fireblocks:fireblocks-network-api
    name: Fireblocks Network and Off-Exchange API
    tags:
      - Digital Assets
      - Network
      - Off-Exchange
      - Settlement
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-network-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Configure Fireblocks Network connections (point-to-point connectivity layer between Fireblocks workspaces), set
      routing policies per asset, and operate Off-Exchange — Fireblocks' settlement layer that keeps collateral in MPC
      custody while mirroring balances to integrated exchanges.
  - aid: fireblocks:fireblocks-compliance-api
    name: Fireblocks Compliance and Policy API
    tags:
      - Digital Assets
      - Compliance
      - AML
      - Travel Rule
      - Policy
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-compliance-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      AML transaction screening, Travel Rule VASP messaging (FATF Recommendation 16), address registry lookups, and the
      workspace Policy Editor (Beta and V2). Wire third-party screening providers (Chainalysis, Elliptic, TRM) into the
      transaction lifecycle and codify the workspace's transaction-authorization rules.
  - aid: fireblocks:fireblocks-gas-station-api
    name: Fireblocks Gas Station API
    tags:
      - Digital Assets
      - Gas Station
      - Fees
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-gas-station-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Configure the Fireblocks Gas Station — auto-fuel logic that tops up native-asset balances in vault accounts so
      ERC-20 / SPL / contract-call transactions don't fail for lack of gas. Per-asset thresholds are
      workspace-configurable.
  - aid: fireblocks:fireblocks-workspace-api
    name: Fireblocks Workspace Management API
    tags:
      - Digital Assets
      - Administrative
      - Users
      - Keys
      - Audit
    humanURL: https://developers.fireblocks.com/reference/api-overview
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/api-overview
        type: Documentation
      - url: openapi/fireblocks-workspace-api-openapi.yml
        type: OpenAPI
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Manage everything inside a Fireblocks workspace — API users, console users, user groups, audit logs, cosigners,
      signing keys, KeyLink external-key management, workspace freeze/unfreeze, and Admin Quorum administrative
      approvals.
  - aid: fireblocks:fireblocks-webhooks-api
    name: Fireblocks Webhooks API
    tags:
      - Digital Assets
      - Webhooks
      - Events
      - Push
    humanURL: https://developers.fireblocks.com/reference/webhook-notifications
    baseURL: https://api.fireblocks.io/v1
    properties:
      - url: https://developers.fireblocks.com/reference/webhook-notifications
        type: Documentation
      - url: openapi/fireblocks-webhooks-api-openapi.yml
        type: OpenAPI
      - url: json-schema/fireblocks-webhook-event-schema.json
        type: JSONSchema
      - url: json-ld/fireblocks-context.jsonld
        type: JSONLD
    description: >-
      Receive push notifications when workspace events occur — TRANSACTION_CREATED, TRANSACTION_STATUS_UPDATED,
      VAULT_ACCOUNT_ADDED, EMBEDDED_WALLET_DEVICE_PAIRED, SMART_TRANSFER events, and more. Each event is signed with
      RSA-SHA512 in the Fireblocks-Signature header so the consumer can verify authenticity before processing. Webhooks
      V2 surface adds destination management and replay-from-history.
