description: >-
  Fireblocks is an institutional digital-asset and stablecoin infrastructure company providing MPC-secured custody,
  wallets (custodial and non-custodial / embedded), payments, tokenization, staking, smart contracts, off-exchange
  settlement, and DeFi security to trading firms, fintechs, exchanges, payment service providers, banks, financial
  institutions, and Web3 companies. The Fireblocks REST API exposes 236+ operations across 15 surface areas — Vaults,
  Transactions, Wallets, Assets, Exchange, Tokenization, Contracts, Staking, NFTs, Payments, Network/Off-Exchange,
  Compliance, Gas Station, Workspace Management, and Webhooks — alongside the separate Non-Custodial Wallet (NCW) API
  for embedded wallets.
