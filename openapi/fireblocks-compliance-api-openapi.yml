          example: John
        secondaryIdentifier:
          type: string
          description: The secondary identifier of the name
          example: Doe
        nameIdentifierType:
          type: string
          description: 'Specifies the type of name for a natural person. Acceptable values are: - ''ALIA'': Alias name, a
            name other than the legal name by which a natural person is also known. - ''BIRT'': Name at birth, the name given
            to a natural person at birth. - ''MAID'': Maiden name, the original name of a natural person who has changed their
            name after marriage. - ''LEGL'': Legal name, the name that identifies a natural person for legal, official, or
            administrative purposes. - ''MISC'': Unspecified, a name by which a natural person may be known but cannot otherwise
            be categorized.'
          enum:
          - ALIA
          - BIRT
          - MAID
          - LEGL
          - MISC
          example: LEGL
