      type: object
      description: Represents the date and place of birth for a natural person
      properties:
        dateOfBirth:
          type: string
          description: Date of birth in ISO 8601 format (YYYY-MM-DD)
          example: 1990-01-01
        placeOfBirth:
          type: string
          description: Place of birth (max 70 characters)
          maxLength: 70
          example: New York, USA
    TravelRuleValidateFullTransactionRequest:
      type: object
      properties:
        originatorVASPdid:
          type: string
          description: The Decentralized Identifier (DID) of the exchange (VASP) that is sending the virtual assets. This
            identifier is unique to the exchange and is generated when the exchange's account is  created in the Notabene
            network.
          example: did:ethr:0x44957e75d6ce4a5bf37aae117da86422c848f7c2
        beneficiaryVASPdid:
          type: string
          description: The Decentralized Identifier (DID) of the exchange (VASP) that is receiving the virtual assets. This
            identifier is unique to the exchange and is generated when the exchange's account is  created in the Notabene
            network.
          example: did:ethr:0x17fe2dd11a2daa7f6c1fdf22532a4763f963aea6
        transactionAsset:
          type: string
          description: "Transaction asset symbol (e.g., BTC, ETH, USDC). \nBy using the `notation` query string, users can\
            \ select the type of asset notation \n- `fireblocks`: Converts asset symbols to Fireblocks notation. \n- `notabene`:\
            \ Retains the original Notabene asset symbol format.\n"
          example: BTC
        transactionAmount:
          type: string
          description: "Transaction amount in the transaction asset. For example, if the asset is BTC, the amount \nis the\
            \ value in BTC units. \nBy using the `notation` query string, users can select the type of amount notation\n-\
            \ `fireblocks`: Converts the amount to Fireblocks notation (e.g., adjusted for decimals).\n- `notabene`: Retains\
            \ the original Notabene amount format.\n"
          example: '10'
        originatorVASPname:
          type: string
          description: The name of the VASP acting as the transaction originator.
          example: Originator VASP Ltd.
        beneficiaryVASPname:
          type: string
          description: The name of the VASP acting as the transaction beneficiary.
          example: Beneficiary VASP Inc.
        transactionBlockchainInfo:
          description: Information about the blockchain transaction.
          allOf:
          - $ref: '#/components/schemas/TravelRuleTransactionBlockchainInfo'
        originator:
          description: Information about the originator of the transaction.
          allOf:
          - $ref: '#/components/schemas/TravelRuleValidatePiiIVMS'
        beneficiary:
          description: Information about the beneficiary of the transaction.
          allOf:
          - $ref: '#/components/schemas/TravelRuleValidatePiiIVMS'
        encrypted:
          type: string
          description: Encrypted data related to the transaction.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        protocol:
          type: string
          description: The protocol used to perform the travel rule.
          example: IVMS101
        skipBeneficiaryDataValidation:
          type: boolean
          description: Whether to skip validation of beneficiary data.
          example: false
        travelRuleBehavior:
          type: boolean
          description: Whether to check if the transaction complies with the travel rule in the beneficiary VASP's jurisdiction.
          example: true
        originatorRef:
          type: string
          description: A reference ID related to the originator of the transaction.
          example: ORG123456
        beneficiaryRef:
          type: string
          description: A reference ID related to the beneficiary of the transaction.
          example: BEN654321
        travelRuleBehaviorRef:
          type: string
          description: A reference ID related to the travel rule behavior.
          example: TRB987654
        originatorProof:
          description: Ownership proof related to the originator of the transaction.
          allOf:
          - $ref: '#/components/schemas/TravelRuleOwnershipProof'
        beneficiaryProof:
          description: Ownership proof related to the beneficiary of the transaction.
          allOf:
          - $ref: '#/components/schemas/TravelRuleOwnershipProof'
        beneficiaryDid:
          type: string
          description: "The Decentralized Identifier (DID) of the person at the receiving exchange (VASP).  This identifier\
            \ is generated when the customer is registered in the Notabene network,  or automatically created based on the\
            \ `beneficiaryRef`.  - If neither `beneficiaryRef` nor `beneficiaryDid` is provided in the `txCreate` payload,\
            \ \n  a new random DID is generated for every transaction."
          example: did:key:z6Mkf67890Zghijkl67890
        originatorDid:
          type: string
          description: "The Decentralized Identifier (DID) of the person at the exchange (VASP) who is requesting the withdrawal.\
            \ This identifier is generated when the customer is registered in the Notabene network or automatically created\
            \ based on the `originatorRef`.  - If neither `originatorRef` nor `originatorDid` is provided in the `txCreate`\
            \ payload, \n  a new random DID is generated for every transaction."
          example: did:key:z6Mkf12345Zabcdef12345
        isNonCustodial:
          type: boolean
          description: Indicates if the transaction involves a non-custodial wallet.
          example: true
        notificationEmail:
          type: string
          description: The email address where a notification should be sent upon completion of the travel rule
        pii:
          description: Personal identifiable information related to the transaction
          allOf:
          - $ref: '#/components/schemas/TravelRulePiiIVMS'
        pii_url:
          type: string
          description: The URL of the personal identifiable information related to the transaction
      required:
      - originator
      - beneficiary
    TravelRuleValidateGeographicAddress:
      type: object
      properties:
        streetName:
          type: string
          description: Name of a street or thoroughfare
          example: 123 Main St
        townName:
          type: string
          description: Name of a built-up area, with defined boundaries, and a local government
          example: New York
        country:
          type: string
          description: Nation with its own government (ISO-3166 Alpha-2 country code)
          example: US
        buildingNumber:
          type: string
          description: Number that identifies the position of a building on a street
          example: 123
        postCode:
          type: string
          description: Identifier consisting of a group of letters and/or numbers added to a postal address to assist the
            sorting of mail
          example: 12345
        addressType:
          type: string
          description: 'Specifies the type of address. Acceptable values are: - ''HOME'': Residential, the home address -
            ''BIZZ'': Business, the business address - ''GEOG'': Geographic, an unspecified physical (geographical) address'
          enum:
          - HOME
          - BIZZ
          - GEOG
          example: HOME
        department:
          type: string
          description: Identification of a division of a large organisation or building
          example: IT
        subDepartment:
          type: string
          description: Identification of a sub-division of a large organisation or building
          example: Security
        buildingName:
          type: string
          description: Name of the building or house
          example: Acme Building
        floor:
          type: string
          description: Floor or storey within a building
          example: 1
        postBox:
          type: string
          description: Numbered box in a post office
          example: 123
        room:
          type: string
          description: Building room number
          example: 101
        townLocationName:
          type: string
          description: Specific location name within the town
          example: Downtown
        districtName:
          type: string
          description: Identifies a subdivision within a country subdivision
          example: Manhattan
        countrySubDivision:
          type: string
          description: Identifies a subdivision of a country such as state, region, or province
          example: New York
        addressLine:
          type: array
          items:
            type: string
          description: Information that locates and identifies a specific address, presented in free format text
          example:
          - 123 Main St
          - New York
          - NY 12345
    TravelRuleValidateLegalPerson:
