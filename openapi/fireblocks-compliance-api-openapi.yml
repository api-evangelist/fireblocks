        destination:
          type: string
          example: bc1qxy2kgdygjrsqtzq2n0yrf1234p83kkfjhx0wlh
          description: Transaction destination address
        transactionAmount:
          type: string
          example: '10'
          description: Transaction amount in the transaction asset
        originatorVASPdid:
          type: string
          example: did:ethr:0x44957e75d6ce4a5bf37aae117da86422c848f7c2
          description: This is the identifier assigned to your VASP
        originatorEqualsBeneficiary:
          type: boolean
          example: false
          description: '"True" if the originator and beneficiary is the same person and you therefore do not need to collect
            any information. "False" if it is a third-party transfer.'
        travelRuleBehavior:
          type: boolean
          example: true
          description: This will also check if the transaction is a TRAVEL_RULE in the beneficiary VASP's jurisdiction
        beneficiaryVASPdid:
          type: string
          example: did:ethr:0x46a7ed5813ce735387df2bfb245bd7722e0de992
          description: This is the identifier assigned to the VASP the funds are being sent to
        beneficiaryVASPname:
          type: string
          example: HelloCrypto
          description: Beneficiary VASP name
        beneficiaryName:
          type: string
          example: John Doe
          description: Beneficiary  name
        beneficiaryAccountNumber:
          type: string
          example: 1234-1234-1234-12234
          description: Beneficiary  name
        beneficiaryAddress:
          example: '{"addressLine: [Wayne Manor, Gotham City, New York, USA]"}'
          description: Beneficiary  name
          allOf:
          - $ref: '#/components/schemas/TravelRuleAddress'
      required:
      - transactionAsset
      - destination
      - transactionAmount
      - originatorVASPdid
      - originatorEqualsBeneficiary
    TravelRuleValidateTransactionResponse:
      type: object
      properties:
        isValid:
          type: boolean
          description: '"isValid" will tell you if you have collected all the information needed for the travel rule data
            transfer. Once this field = "true", you can move on to the next step which is to transfer the front-end information
            to your back-end and perform Travel Rule Transaction create'
          example: true
        type:
          type: string
          description: '"type" will tell you if the virtual asset value converted to FIAT value of the withdrawal request
            is above (=TRAVELRULE) or below (=BELOW_THRESHOLD) the threshold in your jurisdiction. If it is to an unhosted
            wallet which does not require travel rule information to be sent and only collected, it will say NON_CUSTODIAL.'
          example: TRAVELRULE
        beneficiaryAddressType:
          type: string
          description: '"beneficiaryAddressType" will tell you if your blockchain analytics provider or internal address book
            has been able to identify the wallet address.'
          example: UNKNOWN
        addressSource:
          type: string
          description: '"addressSource" will tell you if the address was found in your internal address book or identified
            by the blockchain analytics provider.'
          example: UNKNOWN
        beneficiaryVASPdid:
          type: string
          description: The VASP DID of the beneficiary VASP
          example: did:ethr:0x46a7ed5813ce735387df2bfb245bd7722e0de992
        beneficiaryVASPname:
          type: string
          description: '"beneficiaryVASPname" will tell you the name of the VASP that has been identified as the owner of
            the wallet address. This name is used in a subsequent call to get its DID.'
          example: Fireblocks
        warnings:
          description: '"errors/warnings" will tell you what information about the beneficiary you need to collect from the
            sender.'
          example:
          - optional-beneficiaryAccountNumber
          type: array
          items:
            type: string
      required:
      - isValid
      - type
      - beneficiaryAddressType
      - addressSource
      - beneficiaryVASPdid
      - beneficiaryVASPname
      - warnings
    TravelRuleVaspForVault:
      type: object
      properties:
        vaspDid:
          description: VASP DID
          type: string
          example: did:ethr:0x5dddec8dd669c49304ddbcba36ccc6e0798534dc
    UpdateDraftRequestV2:
      type: object
      description: Request schema for updating draft with policy types and rules
      required:
      - policyTypes
      - rules
      properties:
        policyTypes:
          type: array
          items:
            $ref: '#/components/schemas/PolicyTypeV2'
        rules:
          type: array
          description: Array of policy rules
          items:
            $ref: '#/components/schemas/PolicyRuleV2'
    VerdictConfigV2:
      type: object
      description: Verdict configuration
      properties:
        action:
          type: string
          enum:
          - ALLOW
          - BLOCK
          - 2-TIER
          - ACCEPT
          - REJECT
          - ALERT
          - SCREEN
          - PASS
          - WAIT
          - FREEZE
          - CANCEL
          description: Verdict action
          example: ALLOW
        approvers:
          $ref: '#/components/schemas/ApproversConfigV2'
        designatedSigners:
          $ref: '#/components/schemas/DesignatedSignersConfigV2'
      required:
      - action
  securitySchemes:
    bearerTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    X-Idempotency-Key:
      name: Idempotency-Key
      in: header
      description: A unique identifier for the request. If the request is sent multiple times with the same idempotency key,
        the server will return the same response as the first request. The idempotency key is valid for 24 hours.
      required: false
      schema:
        type: string
        example: some-unique-id
    X-End-User-Wallet-Id:
      name: X-End-User-Wallet-Id
      in: header
      description: Unique ID of the End-User wallet to the API request. Required for end-user wallet operations.
      required: false
      schema:
        type: string
        format: uuid
        example: bd53b580-f69d-4ff9-ba9b-71ef02aaee13
  responses:
    Error:
      description: Error Response
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
