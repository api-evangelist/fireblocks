            - $ref: '#/components/schemas/ProviderID'
        baseAssetId:
          type: string
        baseAssetRail:
          $ref: '#/components/schemas/TransferRail'
        quoteAssetId:
          type: string
        quoteAssetRail:
          $ref: '#/components/schemas/TransferRail'
        baseAmount:
          type: string
          pattern: ^\d+(\.\d+)?$
