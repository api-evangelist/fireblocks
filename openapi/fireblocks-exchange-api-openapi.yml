    Quote:
      allOf:
      - type: object
        properties:
          via:
            $ref: '#/components/schemas/AccessType'
          id:
            type: string
          type:
            type: string
            enum:
            - COMMITTED
            - INDICATIVE
          quoteAssetId:
            type: string
          baseAssetId:
            type: string
          baseAmount:
            type: string
          quoteAmount:
            type: string
          priceImpact:
            type: number
          quoteMinAmount:
            type: string
          executionSteps:
            type: array
            items:
              $ref: '#/components/schemas/ExecutionStepDetails'
          generalFees:
            type: array
            items:
              $ref: '#/components/schemas/Fee'
          side:
            type: string
            enum:
            - BUY
            - SELL
            description: Side of the order
        required:
        - via
        - id
        - baseAssetId
        - quoteAssetId
        - baseAmount
        - quoteAmount
        - type
        - side
      - discriminator:
          propertyName: type
          mapping:
            COMMITTED: '#/components/schemas/CommittedQuoteType'
            INDICATIVE: '#/components/schemas/IndicativeQuoteType'
        oneOf:
        - $ref: '#/components/schemas/CommittedQuoteType'
        - $ref: '#/components/schemas/IndicativeQuoteType'
    QuoteExecutionRequestDetails:
      type: object
      properties:
        type:
          type: string
          enum:
          - QUOTE
          description: Order type for quote orders
        quoteId:
          type: string
          description: Quote ID for quote orders
      required:
      - type
      - quoteId
      example:
        type: QUOTE
        quoteId: quote_8f2e4d1a9c5b7e3f
    QuoteExecutionResponseDetails:
      allOf:
      - type: object
        properties:
          type:
            type: string
            enum:
            - QUOTE
            description: Order type for quote orders
          quoteId:
            type: string
            description: Quote ID for quote orders
          quoteAmount:
            type: string
            description: Quote amount for quote orders
        required:
        - type
        - quoteId
        - quoteAmount
      - $ref: '#/components/schemas/ExecutionResponseBaseDetails'
      example:
        type: QUOTE
        quoteId: quote_8f2e4d1a9c5b7e3f
        quoteAmount: '0.02458'
        side: BUY
        baseAmount: '1000.00'
        baseAssetId: USDC
        baseAssetRail: BLOCKCHAIN
        quoteAssetId: BTC
        quoteAssetRail: BLOCKCHAIN
    QuoteExecutionWithRequoteRequestDetails:
      allOf:
      - $ref: '#/components/schemas/QuoteExecutionRequestDetails'
      - type: object
        properties:
          reQuote:
            discriminator:
              propertyName: type
              mapping:
                MARKET: '#/components/schemas/MarketRequoteRequestDetails'
                RETRY: '#/components/schemas/RetryRequoteRequestDetails'
            oneOf:
            - $ref: '#/components/schemas/MarketRequoteRequestDetails'
            - $ref: '#/components/schemas/RetryRequoteRequestDetails'
      example:
        type: QUOTE
        quoteId: quote_8f2e4d1a9c5b7e3f
        reQuote:
          type: RETRY
          count: 1
          slippageBps: 50
    QuoteExecutionWithRequoteResponseDetails:
      allOf:
      - $ref: '#/components/schemas/QuoteExecutionResponseDetails'
      - type: object
        properties:
          reQuote:
            discriminator:
              propertyName: type
              mapping:
                MARKET: '#/components/schemas/MarketRequoteRequestDetails'
                RETRY: '#/components/schemas/RetryRequoteRequestDetails'
            oneOf:
            - $ref: '#/components/schemas/MarketRequoteRequestDetails'
            - $ref: '#/components/schemas/RetryRequoteRequestDetails'
      example:
        type: QUOTE
        quoteId: quote_8f2e4d1a9c5b7e3f
        side: BUY
        baseAmount: '1000.00'
        baseAssetId: USDC
        baseAssetRail: BLOCKCHAIN
        quoteAssetId: BTC
        quoteAssetRail: BLOCKCHAIN
        reQuote:
          type: RETRY
          count: 1
          slippageBps: 50
    QuotesResponse:
      type: object
      properties:
        quotes:
          type: array
          items:
            $ref: '#/components/schemas/Quote'
      example:
        quotes:
        - via:
            type: PROVIDER_ACCOUNT
            providerId: bridge-provider-001
            accountId: acc_9f4e2d8b1c6a5e73
          id: quote_8f2e4d1a9c5b7e3f
          type: COMMITTED
          baseAssetId: USDC
          quoteAssetId: BTC
          baseAmount: '1000.00'
          quoteAmount: '0.02458'
          priceImpact: 0.005
          quoteMinAmount: '0.02450'
          expiresAt: '2024-01-15T10:35:00.000Z'
          executionSteps:
          - type: EXECUTE
            fee:
              feeType: ORDER
              assetId: USDC
              amountType: FIXED
              amount: '2.50'
          generalFees:
          - feeType: ORDER
            assetId: USDC
            amountType: FIXED
            amount: '2.50'
    RedeemFundsToLinkedDDAResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates whether the funds were successfully redeemed to the linked DDA
      required:
      - success
    RetryRequoteRequestDetails:
      type: object
      properties:
        type:
          type: string
          enum:
          - RETRY
          description: Indicates that the order should be re-quoted if the original quote is expired, trying to match the
            original quote.
        count:
          type: number
          description: If quote is expired, how many times to re-generate new quotes to try having the order executed as in
            the original quote.
          minimum: 1
          maximum: 10
        slippageBps:
          type: number
          description: Slippage tolerance in basis points (bps) for quote orders - 1 is 0.01% and 10000 is 100%
          default: 1
          minimum: 1
          maximum: 10000
      required:
      - type
      - count
      example:
        type: RETRY
        count: 1
        slippageBps: 50
    Settlement:
      description: Settlement configuration for the order
      discriminator:
        propertyName: type
        mapping:
          PREFUNDED: '#/components/schemas/PrefundedSettlement'
          DVP: '#/components/schemas/DVPSettlement'
          POST_ORDER: '#/components/schemas/PostOrderSettlement'
      oneOf:
      - $ref: '#/components/schemas/PrefundedSettlement'
      - $ref: '#/components/schemas/DVPSettlement'
      - $ref: '#/components/schemas/PostOrderSettlement'
    SettlementSourceAccount:
      discriminator:
        propertyName: type
        mapping:
          VAULT_ACCOUNT: '#/components/schemas/PlatformAccount'
          CONNECTED_ACCOUNT: '#/components/schemas/PlatformAccount'
          FIAT_ACCOUNT: '#/components/schemas/PlatformAccount'
          EXTERNAL: '#/components/schemas/ExternalAccount'
      oneOf:
      - $ref: '#/components/schemas/PlatformAccount'
      - $ref: '#/components/schemas/ExternalAccount'
    TimeInForce:
      type: string
      description: Time in force for limit orders
      enum:
      - FOK
      example: FOK
    TradingAccountType:
      type: string
      enum:
      - COIN_FUTURES
      - COIN_MARGINED_SWAP
      - EXCHANGE
      - FUNDING
      - FUNDABLE
      - FUTURES
      - FUTURES_CROSS
      - MARGIN
      - MARGIN_CROSS
      - OPTIONS
      - SPOT
      - USDT_MARGINED_SWAP_CROSS
      - USDT_FUTURES
      - UNIFIED
    TradingErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum:
              - INTERNAL
              - AUTHENTICATION
              - AUTHORIZATION
              - VALIDATION
              - NOT_FOUND
              - UNPROCESSABLE_ENTITY
              - FORBIDDEN
            message:
              type: string
            errorCode:
              $ref: '#/components/schemas/ErrorCodes'
          required:
          - type
          - message
      required:
      - error
      example:
        error:
          type: VALIDATION
          message: 'Invalid base amount: must be greater than 0'
          errorCode: INVALID_AMOUNT
    TradingProvider:
      oneOf:
      - $ref: '#/components/schemas/AccountBasedAccessProvider'
      - $ref: '#/components/schemas/DirectAccessProvider'
    TransferRail:
      type: string
      description: "Transfer rail: \n* **BLOCKCHAIN** - Transfer over the public blockchain\n* **INTERNAL** - Internal transfer\
        \ within the same account (e.g. sub-accounts or same api key)\n* **PEER** - Peer transfer within the same provider\
        \ network\n* **SWIFT** - International wire transfer\n* **IBAN** - International Bank Account Number transfer\n* **US_WIRE**\
        \ - Domestic wire transfer within the United States (e.g. FedWire)\n* **ACH** - Automated Clearing House transfer,\
        \ typically takes longer but not as expensive as wire transfers\n* **SEPA** - Euro transfers within the SEPA zone\n\
        * **SPEI** - Mexican interbank electronic payment system\n* **PIX** - Brazilian instant payment system\n* **LOCAL_BANK_TRANSFER_AFRICA**\
        \ - Local bank transfers within Africa\n* **MOBILE_MONEY** - Mobile money transfers (e.g. M-Pesa)\n"
      enum:
      - BLOCKCHAIN
      - INTERNAL
      - PEER
      - SWIFT
      - IBAN
      - US_WIRE
      - ACH
      - SEPA
      - SPEI
      - PIX
      - LOCAL_BANK_TRANSFER_AFRICA
      - MOBILE_MONEY
      example: BLOCKCHAIN
    TransferReceipt:
      discriminator:
        propertyName: type
        mapping:
          BLOCKCHAIN: '#/components/schemas/BlockchainTransfer'
          FIAT: '#/components/schemas/FiatTransfer'
      oneOf:
      - $ref: '#/components/schemas/BlockchainTransfer'
      - $ref: '#/components/schemas/FiatTransfer'
  securitySchemes:
    bearerTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    X-Idempotency-Key:
      name: Idempotency-Key
      in: header
      description: A unique identifier for the request. If the request is sent multiple times with the same idempotency key,
        the server will return the same response as the first request. The idempotency key is valid for 24 hours.
      required: false
      schema:
        type: string
        example: some-unique-id
    X-End-User-Wallet-Id:
      name: X-End-User-Wallet-Id
      in: header
      description: Unique ID of the End-User wallet to the API request. Required for end-user wallet operations.
      required: false
      schema:
        type: string
        format: uuid
        example: bd53b580-f69d-4ff9-ba9b-71ef02aaee13
  responses:
    Error:
      description: Error Response
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
