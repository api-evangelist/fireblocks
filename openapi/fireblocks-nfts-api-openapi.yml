components:
  schemas:
    CollectionOwnershipResponse:
      type: object
      properties:
        id:
          type: string
          description: Fireblocks collection id
          example: 0b7baa6a62b00c565fd027e91927d610872e0bd5
        name:
          type: string
          description: Collection name
          example: OpenSea Collections
        symbol:
          type: string
          description: Collection symbol
          example: OPENSTORE
        standard:
          type: string
          description: Collection contract standard
          example: ERC1155
        blockchainDescriptor:
          enum:
          - ETH
          - ETH_TEST3
          - ETH_TEST5
          - ETH_TEST6
          - POLYGON
          - POLYGON_TEST_MUMBAI
          - AMOY_POLYGON_TEST
          - XTZ
          - XTZ_TEST
          - BASECHAIN_ETH
          - BASECHAIN_ETH_TEST3
          - BASECHAIN_ETH_TEST5
          - ETHERLINK
          - ETHERLINK_TEST
          - MANTLE
          - MANTLE_TEST
          - GUN_GUNZILLA_TEST
          - ETH_SONEIUM
          - SONEIUM_MINATO_TEST
          - IOTX_IOTEX
          type: string
          description: Collection's blockchain
        contractAddress:
          type: string
          description: Collection contract standard
          example: '0x2953399124F0cBB46d2CbACD8A89cF0599974963'
      required:
      - id
      - blockchainDescriptor
    GetNFTsResponse:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        data:
          type: array
          items:
            $ref: '#/components/schemas/TokenResponse'
    GetOwnershipTokensResponse:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        data:
          type: array
          items:
            $ref: '#/components/schemas/TokenOwnershipResponse'
    ListOwnedCollectionsResponse:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        data:
          type: array
          items:
            $ref: '#/components/schemas/CollectionOwnershipResponse'
    ListOwnedTokensResponse:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        data:
          type: array
          items:
            $ref: '#/components/schemas/TokenResponse'
    MediaEntityResponse:
      type: object
      properties:
        url:
          type: string
          description: Cached accessible URL
          example: https://static.fireblocks.io/nft/media/aHR0cHM6Ly9pLnNlYWRuLmlvL2djcy9maWxlcy9kYjg4NDIyMDYxODUyZWE2YTZkZWVkMDY2NjI5ODY4Ny5wbmc_dz0
        contentType:
          type: string
          enum:
          - IMAGE
          - VIDEO
          - ANIMATION
          - THREE_D
          - TEXT
          - GIF
          - UNKNOWN_TYPE
          - SVG
          - AUDIO
          description: Media type
      required:
      - url
      - contentType
    Paging:
      type: object
      properties:
        next:
          type: string
          description: Cursor to the next page
      required:
      - next
    SpamOwnershipResponse:
      type: object
      properties:
        result:
          type: boolean
          description: Token spam result
        source:
          type: string
          description: Source of Token's Spam status value
          enum:
          - OWNER
          - SYSTEM
      required:
      - result
      - source
    SpamTokenResponse:
      type: object
      properties:
        result:
          type: boolean
          description: Token spam result
          example: true
      required:
      - result
    TokenCollectionResponse:
      type: object
      properties:
        id:
          description: Collection's ID
          type: string
          example: '0x2953399124F0cBB46d2CbACD8A89cF0599974963'
        name:
          description: Collection's Name
          type: string
          example: OpenSea Collections
        symbol:
          description: Collection's Symbol
          type: string
          example: OPENSTORE
      required:
      - id
    TokenOwnershipResponse:
      type: object
      properties:
        id:
          type: string
          description: The Fireblocks NFT asset id
          example: NFT-ad1bd7bf6b0ecb3495beb17d8540a513c9664e0f
        tokenId:
          type: string
          description: Token id within the contract/collection
          example: '59254621688950848715672884047857802075662195255933291242201099097856995753985'
        standard:
          type: string
          description: Token's standard
          example: ERC721
        metadataURI:
          type: string
          description: URL of the original token JSON metadata
          example: https://api.opensea.io/api/v2/metadata/matic/0x2953399124F0cBB46d2CbACD8A89cF0599974963/592546216889508487156728840478578020756621952
        cachedMetadataURI:
          type: string
          description: URL of the cached token JSON metadata
          example: https://static.fireblocks.io/nft/cb6db032c00fcc483ae0dea333a7f6b2279/metadata.json
        media:
          description: Media items extracted from metadata JSON
          type: array
          items:
            $ref: '#/components/schemas/MediaEntityResponse'
        spam:
          description: Owned Token's Spam status
          allOf:
          - $ref: '#/components/schemas/SpamOwnershipResponse'
        collection:
          description: Parent collection information
          allOf:
          - $ref: '#/components/schemas/TokenCollectionResponse'
        balance:
          description: Token's balance
          type: string
          example: '1'
        vaultAccountId:
          description: Fireblocks Vault Account ID
          type: string
          example: '0'
        ownershipStartTime:
          description: Ownership start timestamp (epoch)
          type: number
          example: 1687865341
        ownershipLastUpdateTime:
          description: Ownership start last update time (epoch)
          type: number
          example: 1687865341
        blockchainDescriptor:
          description: Token's blockchain
          enum:
          - ETH
          - ETH_TEST3
          - ETH_TEST5
          - ETH_TEST6
          - POLYGON
          - POLYGON_TEST_MUMBAI
          - AMOY_POLYGON_TEST
          - XTZ
          - XTZ_TEST
          - BASECHAIN_ETH
          - BASECHAIN_ETH_TEST3
          - BASECHAIN_ETH_TEST5
          - ETHERLINK
          - ETHERLINK_TEST
          - MANTLE
          - MANTLE_TEST
          - GUN_GUNZILLA_TEST
          - ETH_SONEIUM
          - SONEIUM_MINATO_TEST
          - IOTX_IOTEX
          type: string
        description:
          description: Token's metadata description
          type: string
          example: MyNFT Description from the metada
        name:
          description: Token's name
          type: string
          example: MyNFTName
        ncwId:
          type: string
          description: Ownership Non-Custodial Wallet ID
          example: 523ea95a-93a7-43c8-8dbc-ed31f53e6539
        ncwAccountId:
          type: string
          description: Ownership Non-Custodial Wallet's account ID
          example: '0'
        status:
          type: string
          description: Owned Token's status
          enum:
          - LISTED
          - ARCHIVED
      required:
      - id
      - tokenId
      - standard
      - balance
      - ownershipStartTime
      - ownershipLastUpdateTime
      - blockchainDescriptor
      - status
    TokenOwnershipSpamUpdatePayload:
      type: object
      properties:
        assetId:
          type: string
          description: Token's asset id
          example: NFT-abcdefabcdefabcdefabcdefabcdefabcdefabcd
          x-fb-entity: asset
        spam:
          type: boolean
          description: Token's ownership new spam value
          example: true
      required:
      - assetId
      - spam
    TokenOwnershipStatusUpdatePayload:
      type: object
      properties:
        assetId:
          type: string
          description: Token's asset id
          example: NFT-abcdefabcdefabcdefabcdefabcdefabcdefabcd
          x-fb-entity: asset
        status:
          type: string
          description: Token's ownership new status
          enum:
          - LISTED
          - ARCHIVED
          example: ARCHIVED
      required:
      - assetId
      - status
    TokenResponse:
      type: object
      properties:
        id:
          type: string
          description: The Fireblocks NFT asset id
          example: NFT-ad1bd7bf6b0ecb3495beb17d8540a513c9664e0f
        tokenId:
          type: string
          description: Token id within the contract/collection
          example: '592546216889508487156728840478578020756621952559332912422010991022550422'
        standard:
          type: string
          description: ERC721 / ERC1155
          example: ERC1155
        metadataURI:
          type: string
          description: URL of the original token JSON metadata
          example: https://api.opensea.io/api/v2/metadata/matic/0x2953399124F0cBB46d2CbACD8A89cF0599974963/592546216889508487156728840478578020756621952559332912422010991022550422
        cachedMetadataURI:
          type: string
          description: URL of the cached token JSON metadata
          example: https://static.fireblocks.io/nft/ad1bd7bf6b0ecb3495beb17d8540a513c96/metadata.json
        media:
          description: Media items extracted from metadata JSON
          type: array
          items:
            $ref: '#/components/schemas/MediaEntityResponse'
        spam:
          description: Token spam status
          allOf:
          - $ref: '#/components/schemas/SpamTokenResponse'
        collection:
          description: Parent collection information
          allOf:
          - $ref: '#/components/schemas/TokenCollectionResponse'
        blockchainDescriptor:
          type: string
          enum:
          - ETH
          - ETH_TEST3
          - ETH_TEST5
          - ETH_TEST6
          - POLYGON
          - POLYGON_TEST_MUMBAI
          - AMOY_POLYGON_TEST
          - XTZ
          - XTZ_TEST
          - BASECHAIN_ETH
          - BASECHAIN_ETH_TEST3
          - BASECHAIN_ETH_TEST5
          - ETHERLINK
          - ETHERLINK_TEST
          - MANTLE
          - MANTLE_TEST
          - GUN_GUNZILLA_TEST
          - ETH_SONEIUM
          - SONEIUM_MINATO_TEST
          - IOTX_IOTEX
        description:
          description: Token's metadata description
          type: string
          example: This is MyNFT's description fetched from the metadata
        name:
          type: string
          description: Token's metadata name
          example: MyNFTName
      required:
      - id
      - tokenId
      - standard
      - blockchainDescriptor
    UpdateTokenOwnershipStatusDto:
      type: object
      properties:
        status:
          description: Token's status in Fireblocks
          type: string
          enum:
          - LISTED
          - ARCHIVED
      required:
      - status
    UpdateTokensOwnershipSpamRequest:
      type: array
      items:
        $ref: '#/components/schemas/TokenOwnershipSpamUpdatePayload'
    UpdateTokensOwnershipStatusRequest:
      type: array
      items:
        $ref: '#/components/schemas/TokenOwnershipStatusUpdatePayload'
  securitySchemes:
    bearerTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    X-Idempotency-Key:
      name: Idempotency-Key
      in: header
      description: A unique identifier for the request. If the request is sent multiple times with the same idempotency key,
        the server will return the same response as the first request. The idempotency key is valid for 24 hours.
      required: false
      schema:
        type: string
        example: some-unique-id
    X-End-User-Wallet-Id:
      name: X-End-User-Wallet-Id
      in: header
      description: Unique ID of the End-User wallet to the API request. Required for end-user wallet operations.
      required: false
      schema:
        type: string
        format: uuid
        example: bd53b580-f69d-4ff9-ba9b-71ef02aaee13
  responses:
    Error:
      description: Error Response
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
