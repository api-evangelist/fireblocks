components:
  schemas:
    CreateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          description: The url of the webhook where notifications will be sent. URL must be valid, unique and https.
          example: https://example.com/webhook
          minLength: 1
        description:
          type: string
          description: description of the webhook. should not contain special characters.
          example: This webhook is used for transactions notifications
          minLength: 1
        events:
          type: array
          description: event types the webhook will subscribe to
          items:
            $ref: '#/components/schemas/WebhookEvent'
          example:
          - transaction.created
          - transaction.status.updated
        enabled:
          type: boolean
          description: The status of the webhook. If false, the webhook will not receive notifications.
          example: false
          default: true
      required:
      - url
      - description
      - events
    Notification:
      type: object
      properties:
        id:
          type: string
          description: The id of the Notification
          example: 44fcead0-7053-4831-a53a-df7fb90d440f
          format: uuid
        createdAt:
          type: string
          description: The creation date of the notification
          example: '2021-07-01T00:00:00.000Z'
          format: date-time
        updatedAt:
          type: string
          description: The date when the notification was updated
          example: '2021-07-01T00:00:00.000Z'
          format: date-time
        status:
          $ref: '#/components/schemas/NotificationStatus'
        eventType:
          $ref: '#/components/schemas/WebhookEvent'
        eventVersion:
          type: number
          description: The event version of the Notification
          example: 1
        resourceId:
          type: string
          nullable: true
          default: null
          description: The resource id of the event which the Notification is listen to
          example: 44fcead0-7053-4831-a53a-df7fb90d440f
          format: uuid
        attempts:
          default: []
          description: The attempts related to Notification
          type: array
          items:
            type: string
      required:
      - id
      - createdAt
      - updatedAt
      - status
      - eventType
      - eventVersion
    NotificationAttempt:
      type: object
      properties:
        sentTime:
          type: integer
          format: int64
          description: The time when the attempt was sent in milliseconds.
          example: 1625126400000
        duration:
          type: integer
          description: The duration of the attempt in milliseconds.
          example: 130
        responseCode:
          type: integer
          description: The response code of the attempt, when missing refer to failureReason.
          example: 200
        failureReason:
          type: string
          enum:
          - TIMED_OUT
          - NO_RESPONSE
          description: The request failure reason in case responseCode is missing.
          example: TIMED_OUT
      required:
      - sentTime
      - duration
    NotificationAttemptsPaginatedResponse:
      type: object
      properties:
        data:
          type: array
          description: The data of the current page
          items:
            $ref: '#/components/schemas/NotificationAttempt'
        next:
          type: string
          description: The ID of the next Page
          example: eJ0eXAiOiJKV1QiLCJhbGcOiJIUzI1NiJ9
          nullable: true
      required:
      - data
    NotificationPaginatedResponse:
      type: object
      properties:
        data:
          type: array
          description: The data of the current page
          items:
            $ref: '#/components/schemas/Notification'
        next:
          type: string
          description: The ID of the next page
          example: eJ0eXAiOiJKV1QiLCJhbGcOiJIUzI1NiJ9
          nullable: true
      required:
      - data
    NotificationStatus:
      type: string
      description: The status of the Notification
      example: COMPLETED
      enum:
      - COMPLETED
      - FAILED
      - IN_PROGRESS
      - ON_HOLD
    NotificationWithData:
      type: object
      properties:
        id:
          type: string
          example: 44fcead0-7053-4831-a53a-df7fb90d440f
          format: uuid
        createdAt:
          type: string
          description: The creation date of the notification
          example: '2021-07-01T00:00:00.000Z'
          format: date-time
        updatedAt:
          type: string
          description: The date when the notification was updated
          example: '2021-07-01T00:00:00.000Z'
          format: date-time
        status:
          $ref: '#/components/schemas/NotificationStatus'
        eventType:
          $ref: '#/components/schemas/WebhookEvent'
        eventVersion:
          type: number
          description: The event version which the Notification is listen to
          example: 1
        resourceId:
          type: string
          nullable: true
          default: null
          description: The resource id of the event which the Notification is listen to
          example: 44fcead0-7053-4831-a53a-df7fb90d440f
          format: uuid
        attempts:
          default: []
          description: The attempts related to Notification
          type: array
          items:
            type: string
        data:
          type: object
          description: notification data
      required:
      - id
      - createdAt
      - updatedAt
      - status
      - eventType
      - eventVersion
      - attempts
    ResendFailedNotificationsJobStatusResponse:
      type: object
      properties:
        jobId:
          type: string
          description: Bulk resend job ID
          example: 123e4567-e89b-12d3-426614174000
        status:
          type: string
          description: Bulk resend job status
          example: COMPLETED
          enum:
          - QUEUED
          - IN_PROGRESS
          - COMPLETED
          - FAILED
        processed:
          type: number
          description: Number of notifications processed
          example: 100
        total:
          type: number
          description: Total number of notifications to process
          example: 1000
      required:
      - jobId
      - status
      - processed
      - total
    ResendFailedNotificationsRequest:
      type: object
      properties:
        startTime:
          type: number
          description: '(optional) Start time for the resend window in milliseconds since epoch up to 24 hours before the
            current time - Default if missing means 24 hours before the current time in milliseconds since epoch - Maximum
            value is current time in milliseconds since epoch - Minimum value is 24 hours before the current time in milliseconds
            since epoch

            '
          example: 1625097600000
        events:
          type: array
          description: '(optional) Event types to resend, default is all event types - Default if missing means all events
            will be included - Empty array means all events will be included

            '
          example:
          - transaction.created
          - transaction.status.updated
        items:
          $ref: '#/components/schemas/WebhookEvent'
    ResendFailedNotificationsResponse:
      type: object
      properties:
        total:
          type: number
          description: The total number of failed notifications that are scheduled to be resent.
          example: 10
    ResendNotificationsByResourceIdRequest:
      type: object
      properties:
        resourceId:
          type: string
          description: The resource id to resend notifications for
          example: 44fcead0-7053-4831-a53a-df7fb90d440f
          format: uuid
        excludeStatuses:
          type: array
          description: "(optional) List of notification statuses to exclude from the resend operation\n    - It's optional\
            \ but it must be included. For example, if there is no status, the syntax will be \"excludeStatuses\": []\n  \
            \  - Empty array means all statuses will be included\n    - If you want to exclude some statuses, you can use\
            \ the following example: [ IN_PROGRESS, FAILED ]\n    - Default if missing, means all statuses other than \"COMPLETED\"\
            \ will be included\n"
          example:
          - IN_PROGRESS
          - FAILED
          items:
            $ref: '#/components/schemas/NotificationStatus'
      required:
      - resourceId
    ResendTransactionWebhooksRequest:
      type: object
      properties:
        resendCreated:
          type: boolean
        resendStatusUpdated:
          type: boolean
    ResendWebhooksByTransactionIdResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indicates whether the webhooks were successfully resent
      required:
      - success
    ResendWebhooksResponse:
      type: object
      properties:
        messagesCount:
          description: The amount of resent notifications
          type: number
          example: 1
    UpdateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          description: The url of the webhook where notifications will be sent. URL must be valid, unique and https.
          example: https://example.com/webhook
          minLength: 1
        description:
          type: string
          description: description of the webhook of what it is used for.should not contain special characters.
          example: This webhook is used for transactions notifications
          minLength: 1
        events:
          type: array
          description: The events that the webhook will be subscribed to
          example:
          - transaction.created
          - transaction.status.updated
          items:
            $ref: '#/components/schemas/WebhookEvent'
        enabled:
          type: boolean
          description: The status of the webhook
          example: false
    Webhook:
      type: object
      properties:
        id:
          type: string
          description: The id of the webhook
          example: 123e4567-e89b-12d3-a456-426614174000
          format: uuid
        url:
          type: string
          description: The url of the webhook where notifications will be sent. Must be a valid URL and https.
          example: https://example.com/webhook
          minLength: 1
        description:
          type: string
          description: description of the webhook of what it is used for
          example: This webhook is used for transactions notifications
          minLength: 1
        events:
          type: array
          description: The events that the webhook will be subscribed to
          example:
          - transaction.created
          - transaction.status.updated
          items:
            $ref: '#/components/schemas/WebhookEvent'
        status:
          enum:
          - DISABLED
          - ENABLED
          type: string
          description: The status of the webhook
          example: ENABLED
        createdAt:
          type: string
          description: The date and time the webhook was created
          example: '2021-09-01T12:00:00Z'
          format: date-time
        updatedAt:
          type: string
          description: The date and time the webhook was last updated
          example: '2021-09-05T15:00:00Z'
          format: date-time
    WebhookEvent:
      type: string
      enum:
      - transaction.created
      - transaction.status.updated
      - transaction.approval_status.updated
      - transaction.network_records.processing_completed
      - external_wallet.asset.added
      - external_wallet.asset.removed
      - internal_wallet.asset.added
      - internal_wallet.asset.removed
      - contract_wallet.asset.added
      - contract_wallet.asset.removed
      - vault_account.created
      - vault_account.asset.added
      - vault_account.asset.balance_updated
      - vault_account.nft.balance_updated
      - embedded_wallet.created
      - embedded_wallet.account.created
      - embedded_wallet.device.added
      - embedded_wallet.asset.added
      - embedded_wallet.status.updated
      - embedded_wallet.asset.balance_updated
      - onchain_data.updated
      - connection.added
      - connection.removed
      - connection.request.waiting_peer_approval
      - connection.request.rejected_by_peer
      - exchange_account.added
      - fiat_account.added
      - ticket.created
      - ticket.submitted
      - ticket.expired
      - ticket.canceled
      - ticket.fulfilled
      - ticket.counterparty.added
      - ticket.counterparty_external_id.set
      - ticket.note.added
      - ticket.expired_in.set
      - ticket.expired_at.set
      - ticket.term.added
      - ticket.term.updated
      - ticket.term.deleted
      - ticket.term.funded
      - ticket.term.manually_funded
      - ticket.term.funding_canceled
      - ticket.term.funding_failed
      - ticket.term.funding_completed
      - ticket.term.transaction_status_changed
    WebhookPaginatedResponse:
      type: object
      properties:
        data:
          type: array
          description: The data of the current page
          items:
            $ref: '#/components/schemas/Webhook'
        next:
          type: string
          description: The ID of the next page
          example: eJ0eXAiOiJKV1QiLCJhbGcOiJIUzI1NiJ9
          nullable: true
      required:
      - data
  securitySchemes:
    bearerTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    X-Idempotency-Key:
      name: Idempotency-Key
      in: header
      description: A unique identifier for the request. If the request is sent multiple times with the same idempotency key,
        the server will return the same response as the first request. The idempotency key is valid for 24 hours.
      required: false
      schema:
        type: string
        example: some-unique-id
    X-End-User-Wallet-Id:
      name: X-End-User-Wallet-Id
      in: header
      description: Unique ID of the End-User wallet to the API request. Required for end-user wallet operations.
      required: false
      schema:
        type: string
        format: uuid
        example: bd53b580-f69d-4ff9-ba9b-71ef02aaee13
  responses:
    Error:
      description: Error Response
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
