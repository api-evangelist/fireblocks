components:
  schemas:
    AmlRegistrationResult:
      type: object
      properties:
        provider:
          type: string
        success:
          type: boolean
        timestamp:
          type: number
    AmlScreeningResult:
      type: object
      description: The result of the AML screening.
      properties:
        provider:
          type: string
        payload:
          type: object
    AmountInfo:
      type: object
      description: The details of the requested amount to transfer.
      properties:
        amount:
          description: If the transfer is a withdrawal from an exchange, the actual amount that was requested to be transferred.
            Otherwise, the requested amount.
          type: string
        requestedAmount:
          description: The amount requested by the user.
          type: string
        netAmount:
          description: The net amount of the transaction, after fee deduction.
          type: string
        amountUSD:
          description: The USD value of the requested amount.
          type: string
    ApprovalRequest:
      type: object
      description: Approval request details
      properties:
        id:
          type: string
          format: numeric
          description: The approval request identifier
          example: '12345'
        type:
          type: string
          description: The approval request type
          enum:
          - TAG_UPDATE
          - TAG_DELETE
          - TAG_ATTACH_DETACH
        state:
          type: string
          description: The approval request state
          enum:
          - PENDING
          - APPROVED
          - REJECTED
          - FAILED
          - CANCELLED
          - EXPIRED
      required:
      - id
      - type
      - state
    AuthorizationGroups:
      type: object
      properties:
        th:
          type: number
          example: 1
        users:
          type: object
          additionalProperties:
            type: string
            enum:
            - PENDING_AUTHORIZATION
            - APPROVED
            - REJECTED
            - NA
    AuthorizationInfo:
      type: object
      description: The information about your [Transaction Authorization Policy (TAP).](https://developers.fireblocks.com/docs/capabilities#transaction-authorization-policy-tap)
      properties:
        allowOperatorAsAuthorizer:
          type: boolean
        logic:
          type: string
          enum:
          - AND
          - OR
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AuthorizationGroups'
    BlockInfo:
      type: object
      description: "The block hash and height of the block that this transaction was mined in.\n     **Note**: If an outgoing\
        \ transaction uses the destinations object with more than one value in the array, blockHash is set to null."
      properties:
        blockHeight:
          type: string
          example: '19953257'
        blockHash:
          type: string
          nullable: true
          example: '0x1fdc0bc79a07387fa0de794142ead16f26edd9b5c66480139c2c37c422a3935e'
    CancelTransactionResponse:
      type: object
      properties:
        success:
          type: boolean
    ComplianceResult:
      type: object
      description: The result of the Compliance AML/Travel Rule screening.
      properties:
        aml:
          type: object
          description: The end result of the AML screening.
          items:
            $ref: '#/components/schemas/ComplianceScreeningResult'
        tr:
          type: object
          description: The result of the Travel Rule screening.
          items:
            $ref: '#/components/schemas/ComplianceScreeningResult'
        amlList:
          type: array
          description: The list of all results of the AML screening.
          items:
            $ref: '#/components/schemas/ComplianceScreeningResult'
        status:
          type: string
          description: Status of compliance result screening.
          enum:
          - Started
          - AMLStarted
          - AMLCompleted
          - AMLFailed
          - AMLInBackground
          - TRStarted
          - TRCompleted
          - TRFailed
          - Completed
          - RegistrationStarted
          - AMLRegistrationStarted
          - AMLRegistrationCompleted
          - TRUpdateStarted
          - TRUpdateCompleted
          - UpdateCompleted
          - IncomingStarted
          - AMLIncomingStarted
          - AMLIncomingCompleted
          - AMLIncomingFailed
          - AMLIncomingInBackground
          - TRIncomingStarted
          - TRIncomingCompleted
          - TRIncomingFailed
          - IncomingCompleted
        amlRegistration:
          type: object
          description: The results of the AML address registration.
          items:
            $ref: '#/components/schemas/AmlRegistrationResult'
    ComplianceScreeningResult:
      type: object
      properties:
        provider:
          type: string
          description: Screening Provider
          enum:
          - CHAINALYSIS
          - ELLIPTIC
          - CHAINALYSIS_V2
          - ELLIPTIC_HOLISTIC
          - NONE
        payload:
          type: object
          description: 'The payload of the screening result.

            - The payload is a JSON object that contains the screening result.

            - The payload is different for each screening provider.

            '
        bypassReason:
          type: string
          description: Reason AML screening was bypassed
          enum:
          - MANUAL
          - UNSUPPORTED_ASSET
          - BYPASSED_FAILURE
          - UNSUPPORTED_ROUTE
          - PASSED_BY_POLICY
          - TIMED_OUT
          - BAD_CREDENTIALS
          - CONFIGURATION_ERROR
          - DROPPED_BY_BLOCKCHAIN
          - PROCESS_DISMISSED
        screeningStatus:
          type: string
          enum:
          - COMPLETED
          - PENDING
          - BYPASSED
          - FAILED
          - FROZEN
        timestamp:
          type: number
          format: date-time
    CreateTransactionResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique Fireblocks identifier of the transaction
        status:
          type: string
          description: The primary status of the transaction. For details, see [Primary transaction statuses.] (https://developers.fireblocks.com/reference/primary-transaction-statuses)
        systemMessages:
          $ref: '#/components/schemas/SystemMessageInfo'
    DestinationTransferPeerPath:
      type: object
      description: The destination of the transaction.
      properties:
        type:
          $ref: '#/components/schemas/TransferPeerPathType'
        subType:
          $ref: '#/components/schemas/TransferPeerPathSubType'
        id:
          type: string
        name:
          type: string
        walletId:
          type: string
          format: uuid
        oneTimeAddress:
          $ref: '#/components/schemas/OneTimeAddress'
        isCollateral:
          type: boolean
          description: Indicates whether the destination is a collateral account
          example: true
      required:
      - type
    DestinationTransferPeerPathResponse:
      type: object
      description: 'Destination of the transaction.


        **Note:** In case the transaction is sent to multiple destinations, the `destinations` parameter is be used instead
        of this.'
      properties:
        type:
          $ref: '#/components/schemas/TransferPeerPathType'
        subType:
          type: string
          example: External
          description: In case the type is set to `EXCHANGE_ACCOUNT` or `FIAT_ACCOUNT`, the specific exchange vendor name
            or fiat vendor name.In case the type is set to `INTERNAL_WALLET` or `EXTERNAL_WALLET`, the subType is set to `Internal`
            or `External`.
        id:
          type: string
          example: 713153a5-42b8-4865-b871-10aee308e7ac
          nullable: true
          description: The ID of the peer. You can retrieve the ID of each venue object using the endpoints for [listing vault
            accounts](https://developers.fireblocks.com/reference/getpagedvaultaccounts), [listing exchange account](https://developers.fireblocks.com/reference/getexchangeaccounts),
            [listing fiat accounts](https://developers.fireblocks.com/reference/getfiataccounts), [listing internal wallets](https://developers.fireblocks.com/reference/getinternalwallets),
            [listing external wallets](https://developers.fireblocks.com/reference/getexternalwallets), [listing network connections](https://developers.fireblocks.com/reference/getnetworkconnections).
            For the other types, this parameter is not needed.
        name:
          type: string
          description: The name of the peer
          example: Some Peer Name
        walletId:
          type: string
          format: uuid
          example: d5a6453c-c8b8-4ae1-84f5-4002164e711e
        tradingAccount:
          type: string
          nullable: true
          description: If this transaction is an exchange internal transfer, this field will be populated with the type of
            that trading account.
      required:
      - type
    DropTransactionRequest:
      type: object
      properties:
        txId:
          type: string
          description: Fireblocks Transaction ID
          example: cfe5be48-9307-4aa3-8ead-b959fca35dd6
        feeLevel:
          type: string
          description: Transcation Fee Level
          enum:
          - LOW
          - MEDIUM
          - HIGH
        gasPrice:
