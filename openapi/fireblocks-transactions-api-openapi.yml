    TransactionOperation:
      type: string
      default: TRANSFER
      enum:
      - TRANSFER
      - BURN
      - CONTRACT_CALL
      - MINT
      - RAW
      - TYPED_MESSAGE
      - PROGRAM_CALL
      description: "* `TRANSFER` - The default value for an operation. Transfers funds from one account to another. UTXO blockchains\
        \ allow multi-input and multi-output transfers. All other blockchains allow transfers with one source address and\
        \ one destination address.\n* `MINT` - Mints new tokens. Supported for Stellar, Ripple and EVM-based blockchains.\n\
        * `BURN` - Burns tokens. Supported for Stellar, Ripple and EVM-based blockchains.\n* `CONTRACT_CALL` - Calls a smart\
        \ contract method for web3 operations on any EVM blockchain. The Fireblocks [development libraries](https://developers.fireblocks.com/docs/ethereum-development#convenience-libraries)\
        \ are recommended for building contract call transactions.\n* `PROGRAM_CALL` - Calls a smart contract for web3 operations\
        \ on the Solana blockchain.\n  Read more in the [Solana Programs Interactions guide](https://developers.fireblocks.com/reference/interact-with-solana-programs).\n\
        \n* `TYPED_MESSAGE` - An off-chain message in either Ethereum Personal Message or EIP712 format. Use it to sign specific\
        \ readable messages that are not actual transactions. [Learn more about typed messages](https://developers.fireblocks.com/docs/typed-message-signing-1).\n\
        * `RAW` - An off-chain message with no predefined format. Use it to sign any message with your private key, including\
        \ protocols such as blockchains and custom transaction types that are not natively supported by Fireblocks. [Learn\
        \ more about raw signing transactions.](https://developers.fireblocks.com/docs/raw-signing)\n"
    TransactionRequest:
      type: object
      properties:
        operation:
          $ref: '#/components/schemas/TransactionOperation'
        note:
          type: string
          description: Custom note, not sent to the blockchain, to describe the transaction at your Fireblocks workspace.
          example: Ticket 123
        externalTxId:
          type: string
          description: 'Allows you to add a unique ID to help prevent duplicate transactions. No specific format is required
            for this parameter. After you submit a transaction with an external ID, Fireblocks will automatically reject all
            future transactions with the same ID.

            - Using an external ID primarily helps in situations where, even though a submitted transaction responds with
            an error due to an internet outage, the transaction was still sent to and processed on the blockchain.

            - Use [Get a specific transaction by external transaction ID](https://developers.fireblocks.com/reference/gettransactionbyexternalid)
            to validate whether these transactions have been processed.

            '
          example: some_unique_external_tx_id
        assetId:
          type: string
          description: The ID of the asset to transfer; used for `TRANSFER`, `MINT`, or `BURN` operations. See [the list of
            supported assets and their IDs](https://developers.fireblocks.com/reference/listassets).
          x-fb-entity: asset
          example: ETH
        source:
          $ref: '#/components/schemas/SourceTransferPeerPath'
        destination:
          $ref: '#/components/schemas/DestinationTransferPeerPath'
        destinations:
          type: array
          description: For UTXO based blockchains, you can send a single transaction to multiple destinations.
          items:
            $ref: '#/components/schemas/TransactionRequestDestination'
        amount:
          description: "For `TRANSFER` operations, the requested amount to transfer, in the asset\u2019s unit. Fireblocks\
            \ recommends using a numeric string for accurate precision. Although a number input exists, it is deprecated."
          oneOf:
          - type: string
            description: Numeric string (recommended)
            example: '0.02'
          - type: number
            description: Number (deprecated)
            example: 0.02
        treatAsGrossAmount:
          type: boolean
          description: "\"When set to `true`, the fee will be deducted from the requested amount.\"\n\n**Note**: This parameter\
            \ can only be considered if a transaction\u2019s asset is a base asset, such as ETH or MATIC. If the asset can\u2019\
            t be used for transaction fees, like USDC, this parameter is ignored and the fee is deducted from the relevant\
            \ base asset wallet in the source account."
          example: false
        forceSweep:
          type: boolean
          description: "For Polkadot, TON, Kusama and Westend transactions only. When set to true, Fireblocks will empty the\
            \ asset wallet.\n\n   **Note:** If set to true when the source account is exactly 1 DOT, the transaction will\
            \ fail. Any amount more or less than 1 DOT succeeds. This is a Polkadot blockchain limitation."
          example: false
        feeLevel:
          type: string
          description: For UTXO or EVM-based blockchains only. Defines the blockchain fee level which will be payed for the
            transaction. Alternatively, specific fee estimation parameters exist below.
          enum:
          - LOW
          - MEDIUM
          - HIGH
          example: MEDIUM
        fee:
          description: '- **For UTXO-based blockchains**, the fee per bytes in the asset''s smallest unit (Satoshi, Latoshi,
            etc.).

            - **For Ripple**, the fee for the transaction.


            Note:

            - Fireblocks recommends using a numeric string for more precision. Although a number input exists, it is deprecated.

            '
          oneOf:
          - type: string
            description: Numeric string (recommended)
          - type: number
            description: Number (deprecated)
        priorityFee:
          description: '**For Ethereum-based blockchains only.** The fee (in Gwei) for EIP-1559 transaction pricing mechanism.


            Note:

            - Fireblocks recommends using a numeric string for more precision. Although a number input exists, it is deprecated.

            '
          oneOf:
          - type: string
            description: Numeric string (recommended)
            example: '2'
          - type: number
            description: Number (deprecated)
            example: 2
        failOnLowFee:
          type: boolean
          description: When set to `true`, in case the current `MEDIUM` fee level is higher than the one specified in the
            transaction, the transaction will fail to avoid getting stuck with no confirmations.
        maxFee:
          description: The maximum fee (gas price or fee per byte) that should be paid for the transaction. In case the current
            value of the requested `feeLevel` is higher than this requested maximum fee. Represented by a numeric string for
            more precision.
          type: string
          example: '120'
        gasLimit:
          description: '**For EVM-based blockchains only.**  Units of gas required to process the transaction.


            Notes:

            - Only two of the three arguments can be specified in a single transaction: `gasLimit`, `gasPrice`, and/or `networkFee`.

            - Fireblocks recommends using a numeric string for more precision. Although a number input exists, it is deprecated.

            '
          oneOf:
          - type: string
            description: Numeric string (recommended)
            example: '21000'
          - type: number
            description: Number (deprecated)
            example: 21000
        gasPrice:
          description: '**For non-EIP-1559, EVM-based transactions.** Price per gas unit. In Ethereum, this is specified in
            Gwei.


            Notes:

            - Only two of the three arguments can be specified in a single transaction: `gasLimit`, `gasPrice`, and/or `networkFee`.

            - Fireblocks recommends using a numeric string for more precision. Although a number input exists, it is deprecated.

            '
          oneOf:
          - type: string
            description: Numeric string (recommended)
          - type: number
            description: Number (deprecated)
        networkFee:
          description: 'The total transaction fee in the blockchain''s largest unit.


            Notes:

            - Only two of the three arguments can be specified in a single transaction: `gasLimit`, `gasPrice`, and/or `networkFee`.

            - Fireblocks recommends using a numeric string for more precision. Although a number input exists, it is deprecated.

            '
          oneOf:
          - type: string
            description: Numeric string (recommended)
          - type: number
            description: Number (deprecated)
        replaceTxByHash:
          type: string
          description: '**For EVM-based blockchains only.**


            Notes:

            - To replace a transaction, create another transaction using the stuck transaction''s hash and specify a higher
            fee.

            - To drop a transaction, create another transaction using the stuck transaction''s hash and change the `amount`
            field to 0.

            '
          example: 00000000-0000-0000-0000-000000000000
        extraParameters:
          $ref: '#/components/schemas/ExtraParameters'
        customerRefId:
          type: string
          description: The ID for AML providers to associate the owner of funds with transactions.
          example: abcdef
        travelRuleMessage:
          $ref: '#/components/schemas/TravelRuleCreateTransactionRequest'
        autoStaking:
          type: boolean
          description: This feature is no longer supported.
          deprecated: true
        networkStaking:
          deprecated: true
          description: This feature is no longer supported.
          oneOf:
          - type: string
            description: Numeric string (recommended)
          - type: number
            description: Number (deprecated)
        cpuStaking:
          deprecated: true
          description: This feature is no longer supported.
          oneOf:
          - type: string
            description: Numeric string (recommended)
          - type: number
            description: Number (deprecated)
        useGasless:
          type: boolean
          description: '- Override the default gasless configuration by sending true\false'
    TransactionRequestDestination:
      type: object
      properties:
        amount:
          type: string
        destination:
          $ref: '#/components/schemas/DestinationTransferPeerPath'
    TransactionResponse:
      type: object
      properties:
        id:
          type: string
          description: Fireblocks Transaction ID
          example: cfe5be48-9307-4aa3-8ead-b959fca35dd6
        externalTxId:
          type: string
          description: Unique external transaction identifier provided by the user. Used to help prevent duplicate transactions.
          example: my_unique_external_tx_id
        status:
          $ref: '#/components/schemas/TransactionStatus'
        subStatus:
          $ref: '#/components/schemas/TransactionSubStatus'
        txHash:
          type: string
          example: 0f47094cde3fcc168ed97365a7cb3996ad5706fff03e7403e74ffd7a922025d4
          description: "The hash of the transaction on the blockchain.\n * This parameter exists if at least one of the following\
            \ conditions is met:\n\n     1. The transaction\u2019s source type is `UNKNOWN`, `WHITELISTED_ADDRESS`, `NETWORK_CONNECTION`,\
            \ `ONE_TIME_ADDRESS`, `FIAT_ACCOUNT` or `GAS_STATION`.\n\n     2. The transaction\u2019s source type is `VAULT`\
            \ and the status is either: `CONFIRMING`, `COMPLETED`, or was in any of these statuses prior to changing to `FAILED`\
            \ or `REJECTED`. In some instances, transactions in status `BROADCASTING` will include the txHash as well.\n\n\
            \     3. The transaction\u2019s source type is `EXCHANGE_ACCOUNT` and the transaction\u2019s destination type\
            \ is `VAULT`, and the status is either: `CONFIRMING`, `COMPLETED`, or was in any of these status prior to changing\
            \ to `FAILED`.\n\n\n* In addition, the following conditions must be met:\n\n    1. The asset is a crypto asset\
            \ (not fiat).\n\n    2. The transaction operation is not `RAW` or `TYPED_MESSAGE`."
        operation:
          $ref: '#/components/schemas/GetTransactionOperation'
        note:
          type: string
          description: Custom note, not sent to the blockchain, that describes the transaction at your Fireblocks workspace.
          example: My Transcation Note
        blockchainInfo:
          type: object
          description: 'A JSON used to store additional blockchain-specific data.


            **Example:** In HBAR, this property will have the txHash in addition to the txID.

            '
        assetId:
          type: string
          description: The ID of the asset for `TRANSFER`, `MINT`, `BURN`, `ENABLE_ASSET`,`STAKE` ,`UNSTAKE` or `WITHDRAW`
            operations. See the [list of supported assets and their IDs on Fireblocks](https://developers.fireblocks.com/reference/getsupportedassets).
          x-fb-entity: asset
          example: BTC
        assetType:
          type: string
          description: Type classification of the asset
          example: ERC20
        source:
          $ref: '#/components/schemas/SourceTransferPeerPathResponse'
        sourceAddress:
          type: string
          description: 'For account based assets only, the source address of the transaction.

            **Note:** If the status is `CONFIRMING`, `COMPLETED`, or has been `CONFIRMING`; then moved forward to `FAILED`
            or `REJECTED`, then this parameter will contain the source address. In any other case, this parameter will be
            empty.'
          example: bc1qjhm0h7vhdyu0d0luv34dlz654rmsvg8twywk99
        tag:
          type: string
          description: Source address tag for Tag/Memo supporting assets, or Bank Transfer Description for the fiat provider
            BLINC (by BCB Group).
          example: '247016305'
          deprecated: true
        destination:
          $ref: '#/components/schemas/DestinationTransferPeerPathResponse'
        destinations:
          type: array
          description: "The transaction\u2019s destinations.\n**Note:** In case the transaction is sent to a single destination,\
            \ the `destination` parameter is used instead of this."
          items:
            $ref: '#/components/schemas/TransactionResponseDestination'
        destinationAddress:
          type: string
          example: bc1qzfstugu9fn0hq4dv0xhzyw2p2h9mapdery324e
          description: "Address where the asset were transferred.\nNotes:\n  - For [Multi destination transactions](https://support.fireblocks.io/hc/en-us/articles/360018447980-Multi-destination-transactions),\
            \ this parameter will be empty. In this case, you should refer to the destinations field.\n  - If the status is\
            \ `CONFIRMING`, `COMPLETED`, or has been `CONFIRMING`; then moved forward to `FAILED` or `REJECTED`, then this\
            \ parameter will contain the destination address. In any other case, this parameter will be empty."
        destinationAddressDescription:
          type: string
          description: Description of the destination address.
          example: some_description
        destinationTag:
          type: string
          example: '4274981917'
          description: Destination address tag for Tag/Memo supporting assets, or Bank Transfer Description for the fiat provider
            BLINC (by BCB Group).
        contractCallDecodedData:
          description: Decoded data for `CONTRACT_CALL` operations.
          type: object
          properties:
            contractName:
              type: string
            functionCalls:
              type: array
              items:
                type: object
        amountInfo:
          $ref: '#/components/schemas/AmountInfo'
        treatAsGrossAmount:
          type: boolean
          description: 'For transactions initiated via this Fireblocks workspace, when set to `true`, the fee is deducted
            from the requested amount.


            **Note:** This parameter can only be considered if a transaction''s asset is a base asset, such as ETH or MATIC.
            If the asset can''t be used for transaction fees, like USDC, this parameter is ignored and the fee is deducted
            from the relevant base asset wallet in the source account.'
        feeInfo:
          $ref: '#/components/schemas/FeeInfo'
        feeCurrency:
          type: string
          description: The asset which was withdrawn to pay the transaction fee, for example ETH for EVM-based blockchains,
            BTC for Tether Omni.
          example: ETH
        networkRecords:
          type: array
          description: In case a single transaction resulted with multiple transfers, for example a result of a contract call,
            then this parameter specifies each transfer that took place on the blockchain.
          items:
            $ref: '#/components/schemas/NetworkRecord'
        createdAt:
          type: number
          description: "The transaction\u2019s creation date and time, in unix timestamp."
          example: 1716727963121
        lastUpdated:
          type: number
          description: "The transaction\u2019s last update date and time, in unix timestamp."
          example: 1716727961121
        createdBy:
          type: string
          description: User ID of the initiator of the transaction.
          example: 106d86fd-cd76-4554-a3e5-73df10281937
        signedBy:
          type: array
          description: "User ID\u2019s of the signers of the transaction."
          items:
            type: string
            example: 106d86fd-cd76-4554-a3e5-73df10281937
        rejectedBy:
          type: string
          example: c0c1abde-68ed-44bb-8848-6187b22f2442
          description: User ID of the user that rejected the transaction (in case it was rejected).
        authorizationInfo:
          $ref: '#/components/schemas/AuthorizationInfo'
        exchangeTxId:
          type: string
          description: If the transaction originated from an exchange, this is the ID of this transaction at the exchange.
        customerRefId:
          type: string
          example: some_reference
          description: The ID for AML providers to associate the owner of funds with transactions.
        amlScreeningResult:
          $ref: '#/components/schemas/AmlScreeningResult'
        complianceResult:
          $ref: '#/components/schemas/ComplianceResult'
        notBroadcastByFireblocks:
          type: boolean
          description: Indicates the transaction was not broadcast by Fireblocks
          example: false
        dappUrl:
          type: string
          description: dApp URL for Web3 transactions
          example: https://app.uniswap.org/
        gasLimit:
          type: string
          description: Gas limit for EVM-based blockchain transactions
          example: '21000'
        blockchainIndex:
          type: string
          description: Blockchain-specific index or identifier for the transaction
          example: 1.1.1
        paidRent:
          type: string
          description: Solana rent payment amount
          example: '0.00203928'
        extraParameters:
          $ref: '#/components/schemas/ExtraParameters'
        signedMessages:
          $ref: '#/components/schemas/SignedMessages'
        numOfConfirmations:
          type: number
          example: 10
          description: The number of confirmations of the transaction. The number will increase until the transaction will
            be considered completed according to the confirmation policy.
        blockInfo:
          $ref: '#/components/schemas/BlockInfo'
        index:
          type: number
          example: 0
          description: "For UTXO based assets this is the vOut, for Ethereum based, this is the index of the event of the\
            \ contract call.\n **Note:** This field is not returned if a transaction uses the `destinations` object with more\
            \ than one value."
        rewardInfo:
          $ref: '#/components/schemas/RewardInfo'
        feePayerInfo:
          $ref: '#/components/schemas/FeePayerInfo'
        systemMessages:
          $ref: '#/components/schemas/SystemMessageInfo'
        addressType:
          type: string
          enum:
          - ''
          - WHITELISTED
          - ONE_TIME
        requestedAmount:
          description: The amount requested by the user. Deprecated - please use the `amountInfo` field for accuracy.
          type: number
          deprecated: true
        amount:
          description: If the transfer is a withdrawal from an exchange, the actual amount that was requested to be transferred.
            Otherwise, the requested amount. Deprecated - please use the `amountInfo` field for accuracy.
          type: number
          deprecated: true
        netAmount:
          description: The net amount of the transaction, after fee deduction. Deprecated - please use the `amountInfo` field
            for accuracy.
          type: number
          deprecated: true
        amountUSD:
          description: The USD value of the requested amount. Deprecated - please use the `amountInfo` field for accuracy.
          type: number
          nullable: true
          deprecated: true
        serviceFee:
          description: The total fee deducted by the exchange from the actual requested amount (`serviceFee` = `amount` -
            `netAmount`). Deprecated - please use the `feeInfo` field for accuracy.
          type: number
          deprecated: true
        fee:
          description: Deprecated - please use the `feeInfo` field for accuracy.
          type: number
          deprecated: true
        networkFee:
          description: The fee paid to the network. Deprecated - please use the `feeInfo` field for accuracy.
          type: number
          deprecated: true
        errorDescription:
          description: The transaction's revert reason. This field will be returned when  `subStatus` =  'SMART_CONTRACT_EXECUTION_FAILED'.
          type: string
          example: Some error returned by the contract
        replacedTxByHash:
          type: string
          description: If the transaction is a Replace-By-Fee (RBF) transaction, this is the hash of the transaction that
            was replaced.
        nonce:
          type: string
          description: Blockchain nonce for the transaction
