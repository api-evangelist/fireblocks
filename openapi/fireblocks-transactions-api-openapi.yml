    ExtraParameters:
      type: object
      properties:
        nodeControls:
          $ref: '#/components/schemas/NodeControls'
        rawMessageData:
          type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/UnsignedMessage'
            algorithm:
              type: string
              enum:
              - MPC_ECDSA_SECP256K1
              - MPC_ECDSA_SECP256R1
              - MPC_EDDSA_ED25519
          description: Object containing messages for raw signing and the algorithm to be used.
        contractCallData:
          type: string
          description: Hex encoded contract call data as a string.
          example: '0xa9059cbb000000000000000000000000c7f14c1161a5427137b232c077ecdbd1f881c02900000000000000000000000000000000000000000000000000000000a05e0722'
        programCallData:
          type: string
          description: BASE64 encoded Solana unsigned serialized transaction object.
          example: '"AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAECnckDh7gOELSNx5pD92oS2ijhbUvjg0vuo/8tthsbvDi7gZJWA3XnqGrMfSlASBHSPx9i0WEmM065fw4GxrdeYpuUVNx1/Pp2gbwoJC0Pd60uzHOU3EJx13JWL6R34Jt4AQEAAA=="

            '
        inputsSelection:
          type: object
          properties:
            inputsToSpend:
              type: array
              items:
                $ref: '#/components/schemas/UnspentInput'
              description: Inputs that should be used in the transaction.
            inputsToExclude:
              type: array
              items:
                $ref: '#/components/schemas/UnspentInput'
              description: Inputs that shouldn't be used in the transaction.
          description: For UTXO based blockchains, selections of inputs for the transaction.
        allowBaseAssetAddress:
          type: boolean
          default: false
          description: 'Transfers to unmanaged wallets only. When true, if the destination doesn''t have a whitelisted address
            for the requested asset, we''ll use the destination''s whitelisted address of the base asset (e.g., use the ETH
            address for an ERC-20). If the requested asset''s whitelisted address exists, it is used.


            **Note:** This is a premium feature that should be enabled in your workspace. Please contact your Customer Success
            Manager or Fireblocks Support for more information.

            '
      description: 'Additional protocol and operation-specific key-value parameters:

        - For UTXO-based blockchain input selection, add the key `inputsSelection` with the value set to the [input selection
        structure](https://developers.fireblocks.com/reference/transaction-objects#inputsselection). The inputs can be retrieved
        from the [Retrieve Unspent Inputs endpoint](https://developers.fireblocks.com/reference/get_vault-accounts-vaultaccountid-assetid-unspent-inputs).

        - For `RAW` operations, add the key `rawMessageData` with the value set to the [raw message data structure](https://developers.fireblocks.com/reference/raw-signing-objects#rawmessagedata).

        - For `CONTRACT_CALL` operations, add the key `contractCallData` with the value set to the Ethereum smart contract
        Application Binary Interface (ABI) payload. The Fireblocks [development libraries](https://developers.fireblocks.com/docs/ethereum-development#convenience-libraries)
        are recommended for building contract call transactions.

        - For exchange compliance (e.g., Binance) and Travel Rule purposes, include the key `piiData` containing a custom
        JSON structure with Personally Identifiable Information (PII) relevant to the transaction. This data must be **fully
        encrypted by the sender** before being submitted to the Fireblocks API. The recommended encryption method is hybrid
        encryption using AES-256-GCM for the payload and RSA-OAEP for key exchange, with the recipient exchange''s public
        key. Learn more [here](https://developers.fireblocks.com/docs/a-developers-guide-to-constructing-encrypted-pii-messages-for-binance-via-fireblocks).


        **Note:** `rawMessageData`, `contractCallData`, and `inputsSelection` cannot be used together in the same call.

        '
