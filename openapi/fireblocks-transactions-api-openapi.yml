    GetTransactionOperation:
      type: string
      enum:
      - TRANSFER
      - BURN
      - CONTRACT_CALL
      - MINT
      - RAW
      - TYPED_MESSAGE
      - PROGRAM_CALL
      - ENABLE_ASSET
      - STAKE
      - UNSTAKE
      - WITHDRAW
      - REDEEM_FROM_COMPOUND
      - SUPPLY_TO_COMPOUND
      - APPROVE
      description: "* `TRANSFER` - Transfers funds from one account to another. UTXO blockchains allow multi-input and multi-output\
        \ transfers. All other blockchains allow transfers with one source address and one destination address.\n* `MINT`\
        \ - Mints new tokens. Supported for Stellar, Ripple, and EVM-based blockchains.\n* `BURN` - Burns tokens. Supported\
        \ for Stellar, Ripple, and EVM-based blockchains.\n* `CONTRACT_CALL` - Calls a smart contract method for web3 operations\
        \ on any EVM blockchain. The Fireblocks [development libraries](https://developers.fireblocks.com/docs/ethereum-development#convenience-libraries)\
        \ are recommended for building contract call transactions.\n* `TYPED_MESSAGE` - An off-chain message in either Ethereum\
        \ Personal Message or EIP712 format. Use it to sign specific readable messages that are not actual transactions. [Learn\
        \ more about typed messages](https://developers.fireblocks.com/docs/typed-message-signing).\n* `RAW` - An off-chain\
        \ message with no predefined format. Use it to sign any message with your private key, including protocols such as\
        \ blockchains and custom transaction types that Fireblocks do not natively support. [Learn more about raw signing\
        \ transactions.](https://developers.fireblocks.com/docs/raw-message-signing)\n* `PROGRAM_CALL` - Calls a smart contract\
        \ for web3 operations on the Solana blockchain. Read more in the [Solana Programs Interactions guide](https://developers.fireblocks.com/reference/interact-with-solana-programs)\n\
        * `ENABLE_ASSET` - Algorand, DigitalBits, Solana, and Stellar require an on-chain transaction to create an asset wallet\
        \ and enable the deposit address. This transaction is automatically created when adding assets on these blockchains\
        \ at a vault account.\n* `STAKE` - Assign assets to a staking pool managed by a staking validator. Supported for Stellar\
        \ and EVM-based blockchains. This transaction is automatically created when performing staking operations.\n* `UNSTAKE`\
        \ - Remove assets from a staking pool managed by a staking validator. Supported for Stellar and EVM-based blockchains.\
        \ This transaction is automatically created when performing staking operations.\n* `WITHDRAW` - Transfer assets from\
        \ a dedicated staking vault account to another address. Supported for Stellar and EVM-based blockchains. This transaction\
        \ is automatically created when performing staking operations.\n\n    **Note:** Fireblocks will rename this type from\
        \ `WITHDRAW` to a different type name soon. There will be a 7-day notice regarding the new type name.\n\n* `SUPPLY_TO_COMPOUND`\
        \ - Deprecated since April 1st, 2023. Older transactions may have this as their operation, in case users in the workspace\
        \ have used the direct integration between Fireblocks and the Compound DeFI protocol.\n* `REDEEM_FROM_COMPOUND` -\
        \ Deprecated since April 1st, 2023. Older transactions may have this as their operation, in case users in the workspace\
        \ have used the direct integration between Fireblocks and the Compound DeFI protocol.\n* `APPROVE` - Enables the approve\
        \ function for a smart contract to withdraw from a designated wallet. [Learn more](https://support.fireblocks.io/hc/en-us/articles/4404616097426-Approve-Transaction-Amount-Cap).\n"
    GetTransactionsResponse:
