        Default Workspace Presets:\n  - Network Profile Crypto \u2192 **Custom**\n  - Network Profile FIAT \u2192 **None**\n\
        \  - Network Connection Crypto \u2192 **Default**\n  - Network Connection FIAT \u2192 **Default**\n\nSupported asset\
