naftiko: 1.0.0-alpha2
info:
  label: "Fireblocks Contracts \u2014 Contracts"
  description: Fireblocks Contracts business capability. 20 operations against the Fireblocks REST API v1.
  tags:
  - Fireblocks
  - Contracts
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
