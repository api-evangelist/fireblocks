      path: /tokenization/templates
      operations:
      - name: uploadcontracttemplate
        method: POST
        description: Upload contract template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getcontracttemplatebyid
