naftiko: 1.0.0-alpha2
info:
  label: "Fireblocks NFTs \u2014 NFTs"
  description: Fireblocks NFTs business capability. 10 operations against the Fireblocks REST API v1.
  tags:
  - Fireblocks
  - NFTs
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FIREBLOCKS_API_KEY: FIREBLOCKS_API_KEY
    FIREBLOCKS_API_SECRET: FIREBLOCKS_API_SECRET
capability:
  consumes:
  - type: http
    namespace: nfts
    baseUri: https://api.fireblocks.io/v1
    description: Fireblocks NFTs REST capability. JWT-signed using API key + RSA private key.
    resources:
    - name: updateownershiptokens
      path: /nfts/ownership/tokens
      operations:
      - name: updateownershiptokens
        method: PUT
        description: Refresh vault account tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getownershiptokens
      path: /nfts/ownership/tokens
      operations:
      - name: getownershiptokens
        method: GET
        description: List all owned tokens (paginated)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listownedtokens
      path: /nfts/ownership/assets
      operations:
      - name: listownedtokens
        method: GET
        description: List all distinct owned tokens (paginated)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: listownedcollections
      path: /nfts/ownership/collections
      operations:
      - name: listownedcollections
        method: GET
        description: List owned collections (paginated)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refreshnftmetadata
      path: /nfts/tokens/{id}
      operations:
      - name: refreshnftmetadata
        method: PUT
        description: Refresh token metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getnft
      path: /nfts/tokens/{id}
      operations:
      - name: getnft
        method: GET
        description: List token data by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getnfts
      path: /nfts/tokens
      operations:
      - name: getnfts
        method: GET
        description: List tokens by IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: updatetokenownershipstatus
      path: /nfts/ownership/tokens/{id}/status
      operations:
      - name: updatetokenownershipstatus
        method: PUT
        description: Update token ownership status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: updatetokensownershipstatus
      path: /nfts/ownership/tokens/status
      operations:
      - name: updatetokensownershipstatus
        method: PUT
        description: Update tokens ownership status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: updatetokensownershipspam
      path: /nfts/ownership/tokens/spam
      operations:
      - name: updatetokensownershipspam
        method: PUT
        description: Update tokens ownership spam property
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.FIREBLOCKS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: nfts-rest
    port: 8080
    description: REST adapter for Fireblocks NFTs.
    resources:
    - path: /v1/nfts/ownership/tokens
      name: updateownershiptokens
      description: Refresh vault account tokens
      operations:
      - method: PUT
        name: updateownershiptokens
        description: Refresh vault account tokens
        call: nfts.updateownershiptokens
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/nfts/ownership/tokens
      name: getownershiptokens
      description: List all owned tokens (paginated)
      operations:
      - method: GET
        name: getownershiptokens
        description: List all owned tokens (paginated)
        call: nfts.getownershiptokens
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfts/ownership/assets
      name: listownedtokens
      description: List all distinct owned tokens (paginated)
      operations:
      - method: GET
        name: listownedtokens
        description: List all distinct owned tokens (paginated)
        call: nfts.listownedtokens
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfts/ownership/collections
      name: listownedcollections
      description: List owned collections (paginated)
      operations:
      - method: GET
        name: listownedcollections
        description: List owned collections (paginated)
        call: nfts.listownedcollections
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfts/tokens/{id}
      name: refreshnftmetadata
      description: Refresh token metadata
      operations:
      - method: PUT
        name: refreshnftmetadata
        description: Refresh token metadata
        call: nfts.refreshnftmetadata
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/nfts/tokens/{id}
      name: getnft
      description: List token data by ID
      operations:
      - method: GET
        name: getnft
        description: List token data by ID
        call: nfts.getnft
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfts/tokens
      name: getnfts
      description: List tokens by IDs
      operations:
      - method: GET
        name: getnfts
        description: List tokens by IDs
        call: nfts.getnfts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nfts/ownership/tokens/{id}/status
      name: updatetokenownershipstatus
      description: Update token ownership status
      operations:
      - method: PUT
        name: updatetokenownershipstatus
        description: Update token ownership status
        call: nfts.updatetokenownershipstatus
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/nfts/ownership/tokens/status
      name: updatetokensownershipstatus
      description: Update tokens ownership status
      operations:
      - method: PUT
        name: updatetokensownershipstatus
        description: Update tokens ownership status
        call: nfts.updatetokensownershipstatus
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/nfts/ownership/tokens/spam
      name: updatetokensownershipspam
      description: Update tokens ownership spam property
      operations:
      - method: PUT
        name: updatetokensownershipspam
        description: Update tokens ownership spam property
        call: nfts.updatetokensownershipspam
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
  - type: mcp
    namespace: nfts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fireblocks NFTs. One tool per consumed operation.
    tools:
    - name: fireblocks-updateownershiptokens
      description: Refresh vault account tokens
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: nfts.updateownershiptokens
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
    - name: fireblocks-getownershiptokens
      description: List all owned tokens (paginated)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nfts.getownershiptokens
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-listownedtokens
      description: List all distinct owned tokens (paginated)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nfts.listownedtokens
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-listownedcollections
      description: List owned collections (paginated)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nfts.listownedcollections
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-refreshnftmetadata
      description: Refresh token metadata
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: nfts.refreshnftmetadata
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
    - name: fireblocks-getnft
      description: List token data by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nfts.getnft
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-getnfts
      description: List tokens by IDs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nfts.getnfts
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-updatetokenownershipstatus
      description: Update token ownership status
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: nfts.updatetokenownershipstatus
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
    - name: fireblocks-updatetokensownershipstatus
      description: Update tokens ownership status
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: nfts.updatetokensownershipstatus
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
    - name: fireblocks-updatetokensownershipspam
      description: Update tokens ownership spam property
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: nfts.updatetokensownershipspam
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
