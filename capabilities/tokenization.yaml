naftiko: 1.0.0-alpha2
info:
  label: "Fireblocks Tokenization \u2014 Tokenization"
  description: Fireblocks Tokenization business capability. 12 operations against the Fireblocks REST API v1.
  tags:
  - Fireblocks
  - Tokenization
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FIREBLOCKS_API_KEY: FIREBLOCKS_API_KEY
    FIREBLOCKS_API_SECRET: FIREBLOCKS_API_SECRET
capability:
  consumes:
  - type: http
    namespace: tokenization
    baseUri: https://api.fireblocks.io/v1
    description: Fireblocks Tokenization REST capability. JWT-signed using API key + RSA private key.
    resources:
    - name: issuenewtoken
      path: /tokenization/tokens
      operations:
      - name: issuenewtoken
        method: POST
        description: Issue a new token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getlinkedtokens
      path: /tokenization/tokens
      operations:
      - name: getlinkedtokens
        method: GET
        description: List all linked tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: link
      path: /tokenization/tokens/link
      operations:
      - name: link
        method: POST
        description: Link a contract
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: createnewcollection
      path: /tokenization/collections
      operations:
      - name: createnewcollection
        method: POST
        description: Create a new collection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getlinkedcollections
      path: /tokenization/collections
      operations:
      - name: getlinkedcollections
        method: GET
        description: Get collections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getcollectionbyid
      path: /tokenization/collections/{id}
      operations:
      - name: getcollectionbyid
        method: GET
        description: Get a collection by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: unlinkcollection
      path: /tokenization/collections/{id}
      operations:
      - name: unlinkcollection
        method: DELETE
        description: Delete a collection link
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: fetchcollectiontokendetails
      path: /tokenization/collections/{id}/tokens/{tokenId}
      operations:
      - name: fetchcollectiontokendetails
        method: GET
        description: Get collection token details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mintcollectiontoken
      path: /tokenization/collections/{id}/tokens/mint
      operations:
      - name: mintcollectiontoken
        method: POST
        description: Mint tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: burncollectiontoken
      path: /tokenization/collections/{id}/tokens/burn
      operations:
      - name: burncollectiontoken
        method: POST
        description: Burn tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: unlink
      path: /tokenization/tokens/{id}
      operations:
      - name: unlink
        method: DELETE
        description: Unlink a token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getlinkedtoken
      path: /tokenization/tokens/{id}
      operations:
      - name: getlinkedtoken
        method: GET
        description: Return a linked token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.FIREBLOCKS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: tokenization-rest
    port: 8080
    description: REST adapter for Fireblocks Tokenization.
    resources:
    - path: /v1/tokenization/tokens
      name: issuenewtoken
      description: Issue a new token
      operations:
      - method: POST
        name: issuenewtoken
        description: Issue a new token
        call: tokenization.issuenewtoken
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/tokenization/tokens
      name: getlinkedtokens
      description: List all linked tokens
      operations:
      - method: GET
        name: getlinkedtokens
        description: List all linked tokens
        call: tokenization.getlinkedtokens
        outputParameters:
        - type: object
          mapping: $.
