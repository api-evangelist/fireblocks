naftiko: 1.0.0-alpha2
info:
  label: "Fireblocks Assets \u2014 Assets"
  description: Fireblocks Assets business capability. 10 operations against the Fireblocks REST API v1.
  tags:
  - Fireblocks
  - Assets
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FIREBLOCKS_API_KEY: FIREBLOCKS_API_KEY
    FIREBLOCKS_API_SECRET: FIREBLOCKS_API_SECRET
capability:
  consumes:
  - type: http
    namespace: assets
    baseUri: https://api.fireblocks.io/v1
    description: Fireblocks Assets REST capability. JWT-signed using API key + RSA private key.
    resources:
    - name: listassets
      path: /assets
      operations:
      - name: listassets
        method: GET
        description: List assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: registernewasset
      path: /assets
      operations:
      - name: registernewasset
        method: POST
        description: Register an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getasset
      path: /assets/{id}
      operations:
      - name: getasset
        method: GET
        description: Get an asset by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: updateassetusermetadata
      path: /assets/{id}
      operations:
      - name: updateassetusermetadata
        method: PATCH
        description: "Update the user\u2019s metadata for an asset"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: setassetprice
      path: /assets/prices/{id}
      operations:
      - name: setassetprice
        method: POST
        description: Set asset price
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: listblockchains
      path: /blockchains
      operations:
      - name: listblockchains
        method: GET
        description: List blockchains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getblockchain
      path: /blockchains/{id}
      operations:
      - name: getblockchain
        method: GET
        description: Get a Blockchain by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: validateaddress
      path: /transactions/validate_address/{assetId}/{address}
      operations:
      - name: validateaddress
        method: GET
        description: Validate destination address
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: estimatenetworkfee
      path: /estimate_network_fee
      operations:
      - name: estimatenetworkfee
        method: GET
        description: Estimate the required fee for an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getsupportedassets
      path: /supported_assets
      operations:
      - name: getsupportedassets
        method: GET
        description: List assets (Legacy)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.FIREBLOCKS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: assets-rest
    port: 8080
    description: REST adapter for Fireblocks Assets.
    resources:
    - path: /v1/assets
      name: listassets
      description: List assets
      operations:
      - method: GET
        name: listassets
        description: List assets
        call: assets.listassets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets
      name: registernewasset
      description: Register an asset
      operations:
      - method: POST
        name: registernewasset
        description: Register an asset
        call: assets.registernewasset
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/assets/{id}
      name: getasset
      description: Get an asset by ID
      operations:
      - method: GET
        name: getasset
        description: Get an asset by ID
        call: assets.getasset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assets/{id}
      name: updateassetusermetadata
      description: "Update the user\u2019s metadata for an asset"
      operations:
      - method: PATCH
        name: updateassetusermetadata
        description: "Update the user\u2019s metadata for an asset"
        call: assets.updateassetusermetadata
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/assets/prices/{id}
      name: setassetprice
      description: Set asset price
      operations:
      - method: POST
        name: setassetprice
        description: Set asset price
        call: assets.setassetprice
        outputParameters:
        - type: object
          mapping: $.
        with:
          body: rest.body
    - path: /v1/blockchains
      name: listblockchains
      description: List blockchains
      operations:
      - method: GET
        name: listblockchains
        description: List blockchains
        call: assets.listblockchains
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/blockchains/{id}
      name: getblockchain
      description: Get a Blockchain by ID
      operations:
      - method: GET
        name: getblockchain
        description: Get a Blockchain by ID
        call: assets.getblockchain
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions/validate_address/{assetId}/{address}
      name: validateaddress
      description: Validate destination address
      operations:
      - method: GET
        name: validateaddress
        description: Validate destination address
        call: assets.validateaddress
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/estimate_network_fee
      name: estimatenetworkfee
      description: Estimate the required fee for an asset
      operations:
      - method: GET
        name: estimatenetworkfee
        description: Estimate the required fee for an asset
        call: assets.estimatenetworkfee
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/supported_assets
      name: getsupportedassets
      description: List assets (Legacy)
      operations:
      - method: GET
        name: getsupportedassets
        description: List assets (Legacy)
        call: assets.getsupportedassets
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fireblocks Assets. One tool per consumed operation.
    tools:
    - name: fireblocks-listassets
      description: List assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: assets.listassets
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-registernewasset
      description: Register an asset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: assets.registernewasset
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
    - name: fireblocks-getasset
      description: Get an asset by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: assets.getasset
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-updateassetusermetadata
      description: "Update the user\u2019s metadata for an asset"
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: assets.updateassetusermetadata
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
    - name: fireblocks-setassetprice
      description: Set asset price
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: assets.setassetprice
      outputParameters:
      - type: object
        mapping: $.
      with:
        body: tools.body
    - name: fireblocks-listblockchains
      description: List blockchains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: assets.listblockchains
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-getblockchain
      description: Get a Blockchain by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: assets.getblockchain
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-validateaddress
      description: Validate destination address
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: assets.validateaddress
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-estimatenetworkfee
      description: Estimate the required fee for an asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: assets.estimatenetworkfee
      outputParameters:
      - type: object
        mapping: $.
    - name: fireblocks-getsupportedassets
      description: List assets (Legacy)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: assets.getsupportedassets
      outputParameters:
      - type: object
        mapping: $.
