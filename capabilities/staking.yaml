        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/staking/providers
      name: getproviders
      description: List staking providers details
      operations:
      - method: GET
        name: getproviders
        description: List staking providers details
        call: staking.getproviders
        outputParameters:
        - type: object
