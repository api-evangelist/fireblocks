naftiko: 1.0.0-alpha2
info:
  label: "Fireblocks Staking \u2014 Staking"
  description: Fireblocks Staking business capability. 14 operations against the Fireblocks REST API v1.
  tags:
  - Fireblocks
  - Staking
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FIREBLOCKS_API_KEY: FIREBLOCKS_API_KEY
    FIREBLOCKS_API_SECRET: FIREBLOCKS_API_SECRET
capability:
  consumes:
  - type: http
    namespace: staking
    baseUri: https://api.fireblocks.io/v1
    description: Fireblocks Staking REST capability. JWT-signed using API key + RSA private key.
    resources:
    - name: getchains
      path: /staking/chains
      operations:
      - name: getchains
        method: GET
        description: List supported chains for Fireblocks Staking
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mergestakeaccounts
      path: /staking/chains/{chainDescriptor}/merge
      operations:
      - name: mergestakeaccounts
        method: POST
        description: Merge operation on Solana stake accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getchaininfo
      path: /staking/chains/{chainDescriptor}/chainInfo
      operations:
      - name: getchaininfo
        method: GET
        description: Get chain-specific staking summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stake
      path: /staking/chains/{chainDescriptor}/stake
      operations:
      - name: stake
        method: POST
        description: Initiate Stake Operation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: unstake
      path: /staking/chains/{chainDescriptor}/unstake
      operations:
      - name: unstake
        method: POST
        description: Execute an Unstake operation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: withdraw
      path: /staking/chains/{chainDescriptor}/withdraw
      operations:
      - name: withdraw
        method: POST
        description: Execute a Withdraw operation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: claimrewards
      path: /staking/chains/{chainDescriptor}/claim_rewards
      operations:
      - name: claimrewards
        method: POST
        description: Execute a Claim Rewards operation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: split
      path: /staking/chains/{chainDescriptor}/split
      operations:
      - name: split
        method: POST
        description: Execute a Split operation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: getalldelegations
      path: /staking/positions
      operations:
      - name: getalldelegations
        method: GET
        description: List staking positions details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getsummary
      path: /staking/positions/summary
      operations:
      - name: getsummary
        method: GET
        description: Get staking summary details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getsummarybyvault
      path: /staking/positions/summary/vaults
      operations:
      - name: getsummarybyvault
        method: GET
        description: Get staking summary details by vault
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getdelegationbyid
      path: /staking/positions/{id}
      operations:
      - name: getdelegationbyid
        method: GET
        description: Get staking position details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: getproviders
      path: /staking/providers
      operations:
      - name: getproviders
        method: GET
        description: List staking providers details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: approvetermsofservicebyproviderid
      path: /staking/providers/{providerId}/approveTermsOfService
      operations:
      - name: approvetermsofservicebyproviderid
        method: POST
        description: Approve staking terms of service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.FIREBLOCKS_API_KEY}}'
      placement: header
